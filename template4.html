<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мозаика 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-pink: #ff85a2; --bg: #fff5f8; --gold: #d4af37; --deep-pink: #d1305c; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--bg); font-family: 'Montserrat', sans-serif; 
            overflow: hidden; touch-action: none; 
        }

        #game-container { position: relative; transition: transform 0.1s ease; }
        
        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
        }

        .score-box {
            margin-bottom: 15px; font-weight: bold; color: var(--deep-pink);
            background: white; padding: 10px 25px; border-radius: 30px; 
            border: 2px solid var(--p-pink); box-shadow: 0 5px 15px rgba(255,133,162,0.2);
            text-align: center; z-index: 10;
        }

        canvas { 
            background: #fff; border: 5px solid var(--p-pink); border-radius: 15px; 
            display: block; box-shadow: 0 15px 40px rgba(255, 133, 162, 0.3); 
        }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; width: 260px; }
        
        .btn { 
            background: var(--p-pink); border: none; color: white; padding: 18px; 
            border-radius: 15px; font-size: 22px; cursor: pointer; 
            box-shadow: 0 5px 0 #e06a86; transition: all 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-wide { grid-column: span 3; background: var(--gold); box-shadow: 0 5px 0 #b8972f; }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px; background: white; border-radius: 30px; 
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2); 
            border: 3px solid var(--gold);
            animation: pop 0.6s cubic-bezier(0.68, -0.55, 0.275, 1.55); 
            z-index: 100;
        }

        @keyframes pop { from { transform: scale(0.5) translate(-50%, -50%); opacity: 0; } to { transform: scale(1) translate(-50%, -50%); opacity: 1; } }
        
        .card-name { color: var(--p-pink); font-size: 2.2rem; display: block; margin: 15px 0; font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-box">Осталось линий: <span id="lines-left">2</span> 🌸</div>
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="controls">
            <button class="btn" onclick="playerMove(-1)">⬅️</button>
            <button class="btn" onclick="playerRotate(1)">🔄</button>
            <button class="btn" onclick="playerMove(1)">➡️</button>
            <button class="btn btn-wide" onclick="playerDrop()">ВНИЗ ⬇️</button>
        </div>
    </div>

    <div class="card" id="final-card">
        <h1 style="font-family:'Playfair Display'; margin:0;">С праздником!</h1>
        <span id="nameDisplay" class="card-name"></span>
        <p id="messageDisplay" style="color:#666; line-height:1.6;"></p>
        <button onclick="location.reload()" style="margin-top:20px; padding:15px 30px; border-radius:15px; border:none; background:var(--gold); color:white; font-weight:bold; cursor:pointer;">ЕЩЁ РАЗ ✨</button>
    </div>

    <script>
		// --- НАСТРОЙКИ ТВОЕГО КВАДРАТИКА ---
		const BLOCK_IMAGE_URL = 'https://raw.githubusercontent.com/rykacevn-boop/8march/37e8cb4eb88ac8871fc0467859314b0d027a2cfd/image-Photoroom%20(19).png'; 
		const blockSprite = new Image();
		blockSprite.src = BLOCK_IMAGE_URL;

        // Декодирование данных из ссылки
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const ROWS = 20, COLS = 12, SIZE = 20;
        const TARGET_LINES = 2;
        
        ctx.scale(SIZE, SIZE);

        // Цвета (резервные, если картинка не загрузится)
        const colors = [null, '#ff85a2', '#fbbdc3', '#ffb6c1', '#d4af37', '#ffcce0', '#ff69b4', '#ffa07a'];
        const particles = [];

        function createPiece(t) {
            if (t === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (t === 'O') return [[2, 2], [2, 2]];
            if (t === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (t === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (t === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (t === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (t === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        const arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        // --- УНИВЕРСАЛЬНАЯ ОТРИСОВКА ИЗ КВАДРАТИКОВ ---
        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        if (blockSprite.complete && blockSprite.width > 0) {
                            // Рисуем твой спрайт в каждой активной клетке
                            ctx.drawImage(blockSprite, x + offset.x, y + offset.y, 1, 1);
                        } else {
                            // Если картинки нет - рисуем цветной квадрат
                            ctx.fillStyle = colors[value];
                            ctx.fillRect(x + offset.x + 0.05, y + offset.y + 0.05, 0.9, 0.9);
                        }
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, COLS, ROWS);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
            updateParticles();
        }

        // Эффекты взрыва при сборе линии
        function createExplosion(y) {
            for (let x = 0; x < COLS; x++) {
                for (let i = 0; i < 4; i++) {
                    particles.push({
                        x: x + 0.5, y: y + 0.5,
                        vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                        life: 1.0, color: colors[Math.floor(Math.random() * 7) + 1]
                    });
                }
            }
            const container = document.getElementById('game-container');
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 200);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 0.15, 0.15); ctx.globalAlpha = 1;
                }
            }
        }

        // Логика игры
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--; merge(arena, player); playerReset(); sweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            const pos = player.pos.x; let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); player.pos.x = pos; return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function sweep() {
            let rowCount = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
                createExplosion(y);
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y; rowCount++;
            }
            player.score += rowCount;
            document.getElementById('lines-left').textContent = Math.max(0, TARGET_LINES - player.score);
            if (player.score >= TARGET_LINES) setTimeout(finish, 800);
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0; player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) arena.forEach(row => row.fill(0));
        }

        function finish() { isGameOver = true; document.getElementById('game-container').style.display = 'none'; document.getElementById('final-card').style.display = 'block'; }

        let dropCounter = 0, dropInterval = 1000, lastTime = 0, isGameOver = false;
        function update(time = 0) {
            const deltaTime = time - lastTime; lastTime = time;
            dropCounter += deltaTime; if (dropCounter > dropInterval) playerDrop();
            draw(); if (!isGameOver) requestAnimationFrame(update);
        }

        document.addEventListener('keydown', e => {
            if (e.keyCode === 37) playerMove(-1); else if (e.keyCode === 39) playerMove(1);
            else if (e.keyCode === 40) playerDrop(); else if (e.keyCode === 38) playerRotate(1);
        });

        playerReset(); update();
    </script>
</body>
</html>
