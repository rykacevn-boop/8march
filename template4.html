<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мозаика 8 Марта — Special Effects</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
		:root { 
			--p-pink: #ff85a2; 
			--bg: radial-gradient(circle at center, #fff5f8 0%, #ffeaf1 100%); 
			--gold: #d4af37; 
			--deep-pink: #d1305c;
			--glass: rgba(255, 255, 255, 0.85);
			--card-bg: #ffffff;
			--text-main: #444;
			/* Добавляем переменную градиента */
			--gold-grad: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
		}

		/* ПРЕМИУМ ТЕМА */
		[data-vip="1"] {
			--bg: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
			--glass: rgba(30, 30, 30, 0.85);
			/* Заменяем старый желтый на металлический градиент */
			--p-pink: #d4af37; 
			--gold: #fcf6ba; 
			--deep-pink: #d4af37;
			--card-bg: #141414;
			--text-main: #ffffff;
		}
        
        body { 
            margin: 0; padding: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: var(--bg);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; touch-action: none; 
            transition: background 0.5s ease;
        }

        .score-box {
            margin-bottom: 20px; font-weight: 700; color: var(--deep-pink);
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 12px 35px; border-radius: 50px; 
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 1.1rem; letter-spacing: 1px;
        }

        .canvas-wrapper {
            position: relative; padding: 10px;
            background: linear-gradient(45deg, var(--p-pink), var(--gold), var(--p-pink), var(--gold));
            background-size: 400% 400%; animation: borderGradient 8s ease infinite;
            border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        @keyframes borderGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        canvas { background: #fff; border-radius: 20px; display: block; }

        .controls { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; margin-top: 25px; width: 340px; 
        }
        
        .btn { 
            background: linear-gradient(145deg, #ff96b1, #ff7493);
            border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px; 
            border-radius: 18px; font-size: 24px; cursor: pointer; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        [data-vip="1"] .btn:not(.btn-wide) {
            background: linear-gradient(145deg, #444, #222);
            border-color: var(--gold);
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }

        .btn-wide { grid-column: span 3; background: linear-gradient(145deg, #e5c04a, #d4af37); font-weight: 700; font-size: 1rem; color: #000; }
        
        .btn-reset { 
            margin-top: 15px; background: none; border: 2px solid var(--p-pink);
            color: var(--p-pink); padding: 10px 25px; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 50px; background: var(--card-bg); border-radius: 40px; 
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); border: 5px solid var(--gold); z-index: 100;
        }
        
        .card-name { color: var(--p-pink); font-size: 3rem; display: block; margin: 25px 0; font-family: 'Playfair Display', serif; }

        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(6px, -6px); } 75% { transform: translate(-6px, 6px); } }

        #watermark {
            position: fixed; bottom: 10px; right: 10px; font-family: sans-serif; 
            font-size: 12px; color: rgba(128,128,128,0.5); z-index: 9999; display: none;
        }
		
		.gold-text-effect {
			background: var(--gold-grad);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			display: inline-block;
		}

		/* Применяем металлическое золото к кнопкам в VIP режиме */
		[data-vip="1"] .btn-wide {
			background: var(--gold-grad) !important;
			border: none;
			color: #000; /* Черный текст на золоте читается лучше */
			text-shadow: 0 1px 0 rgba(255,255,255,0.3);
		}

		[data-vip="1"] .btn-reset {
			border: 1px solid var(--gold);
			color: var(--gold);
			text-transform: uppercase;
			letter-spacing: 1px;
			background: rgba(212, 175, 55, 0.05);
		}

		[data-vip="1"] .score-box {
			border: 2px solid #d4af37;
			box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
		}
		
		/* Эффект золотых иконок для VIP */
	[data-vip="1"] .btn-icon {
		background: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		font-weight: 900;
		filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));
		font-size: 28px;
		display: inline-block;
		transition: transform 0.2s;
	}

	[data-vip="1"] .btn:active .btn-icon {
		transform: scale(0.9);
	}

	/* Стилизация широкой кнопки */
	[data-vip="1"] .btn-wide span {
		color: #000; /* На золотом фоне текст лучше черный */
		text-transform: uppercase;
		letter-spacing: 2px;
	}
	
	/* Базовый стиль иконки внутри кнопки сброса */
	.btn-reset .btn-icon {
		color: var(--p-pink);
		-webkit-text-fill-color: initial; /* Сбрасываем прозрачность для обычной темы */
		background: none;
		font-size: 1.1rem;
	}

	/* VIP стиль для кнопки сброса */
	[data-vip="1"] .btn-reset .btn-icon {
		background: var(--gold-grad);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		font-weight: bold;
	}

	/* Эффект при наведении на VIP-кнопку */
	[data-vip="1"] .btn-reset:hover {
		background: rgba(212, 175, 55, 0.1);
		box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
		border-color: #fcf6ba;
	}
	
	/* Полностью золотой score-box для VIP */
	[data-vip="1"] .score-box {
		border: 2px solid #d4af37;
		background: rgba(30, 30, 30, 0.9); /* Темный благородный фон */
		box-shadow: 0 0 20px rgba(212, 175, 55, 0.4), inset 0 0 10px rgba(212, 175, 55, 0.2);
		color: #fcf6ba; /* Светлое золото для читаемости */
	}

	/* Применяем металлический градиент к тексту внутри score-box */
	[data-vip="1"] .score-box-text {
		background: var(--gold-grad);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		font-weight: 800;
	}

	/* Стилизация иконки в score-box */
	[data-vip="1"] .score-icon {
		filter: sepia(1) saturate(5) hue-rotate(10deg); /* Превращаем розовый эмодзи в золотой */
	}
    </style>
</head>
<body>

    <div id="game-container" style="display: flex; flex-direction: column; align-items: center;">
        <div class="score-box">
			<span class="score-box-text">Цель: <span id="lines-left">2</span> линии</span> 
			<span class="score-icon">🌸</span>
		</div>
        
        <div class="canvas-wrapper">
            <canvas id="tetris" width="400" height="550"></canvas>
        </div>
        
		<div class="controls">
			<button class="btn" onclick="handleControl('move', -1)">
				<span class="btn-icon">⟨</span>
			</button>
			<button class="btn" onclick="handleControl('rotate', 1)">
				<span class="btn-icon">⟳</span>
			</button>
			<button class="btn" onclick="handleControl('move', 1)">
				<span class="btn-icon">⟩</span>
			</button>
			<button class="btn btn-wide" onclick="handleControl('drop')">
				<span>ОПУСТИТЬ ⏷</span>
			</button>
		</div>

        <button class="btn-reset" id="reset-btn" onclick="playerReset(true)">
		Начать заново <span class="btn-icon" style="font-size: 1.1rem; vertical-align: middle; margin-left: 5px;">⟲</span>
	</button>
    </div>

    <div class="card" id="final-card">
        <h1 style="font-family:'Playfair Display'; margin:0; font-size: 1.8rem; color: var(--text-main); gold-text-effect;">С праздником весны!</h1>
        <span id="nameDisplay" class="card-name gold-text-effect"></span>
        <p id="messageDisplay" style="color: var(--text-main); line-height:1.8; font-size: 1.15rem;"></p>
        <button onclick="location.reload()" style="margin-top:30px; padding:20px 50px; border-radius:25px; border:none; background:var(--gold); color:black; font-weight:bold; cursor:pointer; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4);">ЕЩЁ РАЗ ✨</button>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

    <script>
        const SECRET_SALT = "MySuperSecret8March2026"; 
        const MUSIC_MAP = {
            "1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
        };

        const BLOCK_IMAGE_URL = 'https://raw.githubusercontent.com/rykacevn-boop/8march/37e8cb4eb88ac8871fc0467859314b0d027a2cfd/image-Photoroom%20(19).png'; 
        // ССЫЛКА НА ВАШУ ПРЕМИУМ КАРТИНКУ БЛОКА (ЗАМЕНИТЕ НА СВОЮ)
        const VIP_BLOCK_IMAGE_URL = 'https://raw.githubusercontent.com/rykacevn-boop/8march/c2af023200dd5a0bd65816b0f8a8fc0f868da611/image.png'; 

        const params = new URLSearchParams(window.location.search);
        const nameB64 = params.get('name') || "";
        const msgB64 = params.get('msg') || "";
        const vip = params.get('vip') || "0";
        const musicId = params.get('music') || "0";
        const receivedHash = params.get('hash') || "";
        const theme = (vip === '1') ? "dark" : "light";
        
        let musicStarted = false;
        let isVipActive = false;

        const blockSprite = new Image();
        const vipBlockSprite = new Image();

        function startMusic() {
            if (!musicStarted && MUSIC_MAP[musicId]) {
                const audio = document.getElementById('bg-music');
                audio.src = MUSIC_MAP[musicId];
                audio.play().catch(() => console.log("Audio blocked"));
                musicStarted = true;
            }
        }

        function handleControl(action, val) {
            startMusic();
            if (action === 'move') playerMove(val);
            if (action === 'rotate') playerRotate(val);
            if (action === 'drop') playerDrop();
        }

        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const COLS = 16, ROWS = 22, SIZE = 25, TARGET_LINES = 2;
        
        ctx.scale(SIZE, SIZE);

        const colors = [null, '#ff85a2', '#fbbdc3', '#ffb6c1', '#d4af37', '#ffcce0', '#ff69b4', '#ffa07a'];
        let particles = [], flashingRows = [], isGameOver = false;
        const arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function createPiece(t) {
            if (t === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (t === 'O') return [[2, 2], [2, 2]];
            if (t === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (t === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (t === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (t === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (t === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function drawMatrix(matrix, offset) {
            const currentSprite = isVipActive ? vipBlockSprite : blockSprite;
            
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const drawY = y + offset.y;
                        if (flashingRows.includes(drawY)) {
                            ctx.fillStyle = '#fff'; ctx.fillRect(x + offset.x, drawY, 1, 1);
                        } else if (currentSprite.complete && currentSprite.width > 0) {
                            ctx.drawImage(currentSprite, x + offset.x, drawY, 1, 1);
                        } else {
                            ctx.fillStyle = colors[value];
                            ctx.fillRect(x + offset.x + 0.05, drawY + 0.05, 0.9, 0.9);
                        }
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = isVipActive ? '#111' : '#fff'; 
            ctx.fillRect(0, 0, COLS, ROWS);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
            updateParticles();
        }

        function createExplosion(y) {
            const explosionColors = isVipActive ? ['#d4af37', '#fcf6ba', '#ffffff'] : ['#ff85a2', '#d4af37', '#fff'];
            for (let x = 0; x < COLS; x++) {
                for (let i = 0; i < 8; i++) {
                    particles.push({
                        x: x + 0.5, y: y + 0.5, vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.8,
                        life: 1.0, color: explosionColors[Math.floor(Math.random() * explosionColors.length)], size: Math.random() * 0.2 + 0.05
                    });
                }
            }
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 200);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function sweep() {
            const rowsToRemove = [];
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
                rowsToRemove.push(y);
            }
            if (rowsToRemove.length > 0) {
                flashingRows = [...rowsToRemove];
                setTimeout(() => {
                    rowsToRemove.forEach(y => {
                        createExplosion(y); arena.splice(y, 1);
                        arena.unshift(new Array(COLS).fill(0));
                    });
                    flashingRows = [];
                    player.score += rowsToRemove.length;
                    document.getElementById('lines-left').textContent = Math.max(0, TARGET_LINES - player.score);
                    if (player.score >= TARGET_LINES) setTimeout(finish, 500);
                }, 150);
            }
        }

        function playerReset(manual = false) {
            if (manual) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                document.getElementById('lines-left').textContent = TARGET_LINES;
            }
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                document.getElementById('lines-left').textContent = TARGET_LINES;
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--; 
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                    });
                });
                playerReset(); sweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            const pos = player.pos.x; let offset = 1;
            const matrix = player.matrix;
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) { player.pos.x = pos; return; }
            }
        }

        function finish() { 
            isGameOver = true; 
            document.getElementById('game-container').style.display = 'none'; 
            document.getElementById('final-card').style.display = 'block'; 
        }

        let dropCounter = 0, dropInterval = 800, lastTime = 0;
        function update(time = 0) {
            const deltaTime = time - lastTime; lastTime = time;
            dropCounter += deltaTime; if (dropCounter > dropInterval) playerDrop();
            draw(); if (!isGameOver) requestAnimationFrame(update);
        }

        window.onload = function() {
            const checkString = nameB64 + msgB64 + vip + musicId + theme + SECRET_SALT;
            const calculatedHash = CryptoJS.MD5(checkString).toString();
            const watermark = document.getElementById('watermark');

            if (vip === '1' && calculatedHash === receivedHash) {
                document.documentElement.setAttribute('data-vip', '1');
                isVipActive = true;
                if (watermark) watermark.remove();
            } else {
                if (watermark) watermark.style.display = 'block';
            }

            blockSprite.src = BLOCK_IMAGE_URL;
            vipBlockSprite.src = VIP_BLOCK_IMAGE_URL;

            document.getElementById('nameDisplay').textContent = decode(nameB64);
            document.getElementById('messageDisplay').textContent = decode(msgB64);

            playerReset(); update();
        };

        document.addEventListener('keydown', e => {
            if (isGameOver) return;
            startMusic();
            if (e.keyCode === 37) playerMove(-1);
            else if (e.keyCode === 39) playerMove(1);
            else if (e.keyCode === 40) playerDrop();
            else if (e.keyCode === 38) playerRotate(1);
            else if (e.keyCode === 32) playerDrop();
        });
    </script>
</body>
</html>
