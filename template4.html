<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мозаика 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-pink: #ff85a2; --bg: #fff5f8; --text: #4a4a4a; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff5f8; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        #game-ui { position: relative; width: 240px; }
        canvas { background: #fff; border: 4px solid var(--p-pink); border-radius: 10px; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); touch-action: none; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; width: 240px; }
        .btn { background: var(--p-pink); border: none; color: white; padding: 15px; border-radius: 10px; font-size: 20px; cursor: pointer; }
        .btn-wide { grid-column: span 3; }
        .card { display: none; padding: 30px; background: white; border-radius: 20px; width: 80%; box-shadow: 0 20px 40px rgba(0,0,0,0.1); animation: pop 0.5s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 0; }
        #nameDisplay { color: var(--p-pink); font-size: 2rem; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="game-ui">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="controls">
            <button class="btn" onclick="playerMove(-1)">⬅️</button>
            <button class="btn" onclick="playerRotate(1)">🔄</button>
            <button class="btn" onclick="playerMove(1)">➡️</button>
            <button class="btn btn-wide" onclick="playerDrop()">ВНИЗ ⬇️</button>
        </div>
    </div>

    <div class="card" id="final-card">
        <h1>С праздником!</h1>
        <span id="nameDisplay"></span>
        <p id="messageDisplay"></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return ""; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const ROWS = 20, COLS = 12, SIZE = 20;
        ctx.scale(SIZE, SIZE);

        const colors = [null, '#ff85a2', '#fbbdc3', '#ffb6c1', '#d4af37', '#ffcce0', '#ff69b4', '#ffa07a'];
        const arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function createPiece(t) {
            if (t === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
            if (t === 'O') return [[2, 2], [2, 2]];
            if (t === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (t === 'I') return [[0, 4, 0, 0], [0, 4, 0, 0], [0, 4, 0, 0], [0, 4, 0, 0]];
            return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        }

        function draw() {
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, COLS, ROWS);
            arena.forEach((r, y) => r.forEach((v, x) => { if(v) { ctx.fillStyle = colors[v]; ctx.fillRect(x, y, 1, 1); }}));
            player.matrix.forEach((r, y) => r.forEach((v, x) => { if(v) { ctx.fillStyle = colors[v]; ctx.fillRect(x + player.pos.x, y + player.pos.y, 1, 1); }}));
        }

        function collide() {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y)
                for (let x = 0; x < m[y].length; ++x)
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            return false;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide()) {
                player.pos.y--; 
                player.matrix.forEach((r, y) => r.forEach((v, x) => { if(v) arena[y + player.pos.y][x + player.pos.x] = v; }));
                sweep(); playerReset();
            }
            dropCounter = 0;
        }

        function playerMove(d) { player.pos.x += d; if (collide()) player.pos.x -= d; }
        function playerRotate(d) {
            const pos = player.pos.x; let offset = 1;
            for(let y=0; y<player.matrix.length; ++y) for(let x=0; x<y; ++x) [player.matrix[x][y], player.matrix[y][x]] = [player.matrix[y][x], player.matrix[x][y]];
            player.matrix.forEach(row => row.reverse());
            while (collide()) { player.pos.x += offset; offset = -(offset + (offset > 0 ? 1 : -1)); }
        }

        function sweep() {
            let rows = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
                arena.unshift(arena.splice(y, 1)[0].fill(0)); ++y; rows++;
            }
            player.score += rows;
            if (player.score >= 2) finish(); // Для теста 2 линии
        }

        function playerReset() {
            const pcs = 'ILJOTSZ'; player.matrix = createPiece(pcs[pcs.length * Math.random() | 0]);
            player.pos.y = 0; player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide()) { arena.forEach(r => r.fill(0)); player.score = 0; }
        }

        let dropCounter = 0, lastTime = 0, isGameOver = false;
        function update(time = 0) {
            const dt = time - lastTime; lastTime = time;
            dropCounter += dt; if (dropCounter > 800) playerDrop();
            draw(); if (!isGameOver) requestAnimationFrame(update);
        }

        function finish() {
            isGameOver = true; document.getElementById('game-ui').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';
        }

        playerReset(); update();
    </script>
</body>
</html>
