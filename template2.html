<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой сюрприз ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
            --rose-gold: linear-gradient(135deg, #e5b2ca 0%, #f9e3ef 45%, #d4a3b9 100%);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            /* Благородный теплый фон */
            background: radial-gradient(circle at center, #ffffff 0%, #fdf0f5 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        .container { position: relative; width: 330px; height: 480px; }

        /* Нижний слой (Поздравление) - Эффект дорогой бумаги */
        .card-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 25px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 35px;
            box-sizing: border-box; z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.07);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* Декоративная внутренняя рамка */
        .card-content::after {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid #f3e5ab; border-radius: 18px; pointer-events: none;
        }

        /* Верхний слой (Холст) */
        #scratch-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 25px; cursor: crosshair;
            z-index: 2; touch-action: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: #4a4a4a; font-size: 1.8rem; margin: 0 0 10px 0; 
        }

        #nameDisplay { 
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem; font-weight: 700; margin-bottom: 20px; 
        }
        
        #messageDisplay { 
            color: #6d6d6d; font-size: 1.05rem; line-height: 1.6; font-weight: 300;
            white-space: pre-wrap;
        }

        .hint { 
            position: absolute; bottom: -50px; color: #ad1457; width: 100%; 
            text-align: center; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-content">
        <h1>С праздником,</h1>
        <div id="nameDisplay">Загрузка...</div>
        <div id="messageDisplay">Пусть этот день будет таким же сияющим и чудесным, как ты сама! ✨<br><br>💐</div>
    </div>
    
    <canvas id="scratch-canvas"></canvas>
    <div class="hint">Сотри золото пальцем 👆</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nameBase64 = params.get('name');
    const msgBase64 = params.get('msg');

    function decodeBase64(str) {
        try {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch (e) { return null; }
    }

    const decodedName = decodeBase64(nameBase64);
    const decodedMsg = decodeBase64(msgBase64);

    document.getElementById('nameDisplay').innerText = (decodedName || "Прекрасная Дама");
    if (decodedMsg && decodedMsg.trim() !== "") {
        document.getElementById('messageDisplay').innerText = decodedMsg;
    }

    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        // Розовое золото металлик
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, '#e5b2ca');
        grad.addColorStop(0.3, '#f9e3ef');
        grad.addColorStop(0.5, '#d4a3b9');
        grad.addColorStop(0.7, '#f9e3ef');
        grad.addColorStop(1, '#b5839a');
        
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Добавляем эффект дорогого зернения (блестки)
        for(let i=0; i<800; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.4)' : 'rgba(212,175,55,0.2)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1.5, 1.5);
        }
        
        // Элегантная надпись на слое
        ctx.fillStyle = "rgba(74, 74, 74, 0.6)";
        ctx.font = "600 14px Montserrat";
        ctx.textAlign = "center";
        ctx.letterSpacing = "2px";
        ctx.fillText("SCRATCH FOR SURPRISE", canvas.width/2, canvas.height/2);
    }

    function scratch(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        // Плавный след
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.fill();
        
        checkScratchProgress();
    }

    function checkScratchProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        let clearPixels = 0;
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) clearPixels++;
        }
        
        if (clearPixels / (pixels.length / 4) > 0.5) {
            canvas.style.transition = 'all 1s ease-out';
            canvas.style.filter = 'blur(10px)';
            canvas.style.opacity = '0';
            canvas.style.transform = 'scale(1.1)';
            setTimeout(() => canvas.remove(), 1000);
        }
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });

    window.onload = initCanvas;
</script>

</body>
</html>
