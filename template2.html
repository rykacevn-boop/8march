<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой сюрприз ✨</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: #ff9a9e; font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        .container { position: relative; width: 320px; height: 450px; }

        /* Нижний слой (Поздравление) */
        .card-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            box-sizing: border-box; z-index: 1;
        }

        /* Верхний слой (Холст для стирания) */
        #scratch-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 20px; cursor: crosshair;
            z-index: 2; touch-action: none;
        }

        h1 { color: #d81b60; font-size: 2rem; margin: 10px 0; }
        #nameDisplay { color: #ad1457; font-size: 1.8rem; font-weight: bold; }
        p { color: #880e4f; font-size: 1.1rem; line-height: 1.4; }
        .hint { position: absolute; bottom: -40px; color: white; width: 100%; text-align: center; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-content">
        <h1>🌸 С 8 Марта!</h1>
        <div id="nameDisplay">Прекрасная Дама</div>
        <p>Пусть этот день будет таким же сияющим и чудесным, как ты сама! ✨<br><br>💐💐💐</p>
    </div>
    
    <canvas id="scratch-canvas"></canvas>
    <div class="hint">Сотри защитный слой пальцем 👆</div>
</div>

<script>
    // 1. Декодирование имени
    const params = new URLSearchParams(window.location.search);
    const nameBase64 = params.get('name');
    if (nameBase64) {
        try {
            const decodedName = decodeURIComponent(atob(nameBase64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            document.getElementById('nameDisplay').innerText = decodedName + '!';
        } catch (e) { console.error(e); }
    }

    // 2. Логика стирания
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Устанавливаем размер холста
    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        // Рисуем "защитный" слой
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#c0c0c0'); // Серебристый
        gradient.addColorStop(0.5, '#e0e0e0');
        gradient.addColorStop(1, '#a0a0a0');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Добавляем текст на слой
        ctx.fillStyle = "#777";
        ctx.font = "20px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ТВОЙ СЮРПРИЗ ТУТ", canvas.width/2, canvas.height/2);
    }

    function scratch(e) {
        if (!isDrawing) return;
        
        // Получаем координаты (мышь или тач)
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.globalCompositeOperation = 'destination-out'; // Режим "стерки"
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.fill();
        
        checkScratchProgress();
    }

    // Проверка: сколько стерто (чтобы убрать холст совсем в конце)
    function checkScratchProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        let clearPixels = 0;
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) clearPixels++;
        }
        
        // Если стерто более 50%, удаляем холст плавно
        if (clearPixels / (pixels.length / 4) > 0.5) {
            canvas.style.transition = 'opacity 1s';
            canvas.style.opacity = '0';
            setTimeout(() => canvas.remove(), 1000);
            if (window.navigator.vibrate) window.navigator.vibrate(100); // Вибро на финише
        }
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault(); // Запрещаем прокрутку страницы во время стирания
        scratch(e);
    });

    window.onload = initCanvas;
</script>

</body>
</html>
