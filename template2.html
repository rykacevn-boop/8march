<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой сюрприз ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            /* Стандартная тема (Розовый/Белый) */
            --bg-gradient: radial-gradient(circle at center, #ffffff 0%, #fdf0f5 100%);
            --card-bg: white;
            --text-h1: #4a4a4a;
            --text-msg: #6d6d6d;
            --border-inner: #f3e5ab;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
            --hint-color: #ad1457;
            
            /* Цвета для стираемого слоя (Rose) */
            --scratch-start: #e5b2ca;
            --scratch-mid: #d4a3b9;
            --scratch-end: #b5839a;
        }

        /* Чёрно-золотая тема (Premium) */
        [data-vip="1"] {
            --bg-gradient: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            --card-bg: #141414;
            --text-h1: #ffffff;
            --text-msg: #e0e0e0;
            --border-inner: rgba(212, 175, 55, 0.4);
            --hint-color: #d4af37;

            /* Цвета для стираемого слоя (Gold) */
            --scratch-start: #bf953f;
            --scratch-mid: #fcf6ba;
            --scratch-end: #aa8954;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
            transition: background 0.8s ease;
        }

        .container { position: relative; width: 330px; height: 480px; }

        .card-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-bg); border-radius: 25px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 35px;
            box-sizing: border-box; z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: background 0.5s ease;
        }

        .card-content::after {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid var(--border-inner); border-radius: 18px; pointer-events: none;
        }

        #scratch-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 25px; cursor: crosshair;
            z-index: 2; touch-action: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--text-h1); font-size: 1.8rem; margin: 0 0 10px 0; 
        }

        #nameDisplay { 
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem; font-weight: 700; margin-bottom: 20px; 
        }
        
        #messageDisplay { 
            color: var(--text-msg); font-size: 1.05rem; line-height: 1.6; font-weight: 300;
            white-space: pre-wrap;
        }

        .hint { 
            position: absolute; bottom: -50px; color: var(--hint-color); width: 100%; 
            text-align: center; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        #watermark {
            position: fixed; bottom: 10px; right: 10px; 
            font-family: sans-serif; font-size: 11px; 
            color: rgba(128,128,128,0.4); z-index: 9999; 
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-content">
        <h1>С праздником,</h1>
        <div id="nameDisplay">Загрузка...</div>
        <div id="messageDisplay">Пусть этот день будет таким же сияющим и чудесным, как ты сама! ✨<br><br>💐</div>
    </div>
    
    <canvas id="scratch-canvas"></canvas>
    <div class="hint">Сотри слой пальцем 👆</div>
</div>

<div id="watermark">Создано в @postcard_congrat_bot</div>
<audio id="bg-music" loop></audio>

<script>
    const SECRET_SALT = "MySuperSecret8March2026"; 
    const MUSIC_MAP = {
        "1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        "2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
        "3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
    };

    const params = new URLSearchParams(window.location.search);
    const nameBase64 = params.get('name') || "";
    const msgBase64 = params.get('msg') || "";
    const vipParam = params.get('vip') || "0";
    const musicId = params.get('music') || "0";
    const theme = params.get('theme') || "light"; // Берем тему из URL
    const receivedHash = params.get('hash') || "";

    let musicStarted = false;
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function decodeBase64(str) {
        if (!str) return null;
        try {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4 !== 0) base64 += '=';
            return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        } catch (e) { return null; }
    }

    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        // Получаем текущие цвета из CSS (они меняются при [data-vip="1"])
        const style = getComputedStyle(document.documentElement);
        const c1 = style.getPropertyValue('--scratch-start').trim();
        const c2 = style.getPropertyValue('--scratch-mid').trim();
        const c3 = style.getPropertyValue('--scratch-end').trim();

        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, c1);
        grad.addColorStop(0.5, c2);
        grad.addColorStop(1, c3);
        
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for(let i=0; i<800; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.4)' : 'rgba(212,175,55,0.3)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1.5, 1.5);
        }
        
        ctx.fillStyle = (vipParam === '1') ? "rgba(0, 0, 0, 0.7)" : "rgba(74, 74, 74, 0.6)";
        ctx.font = "600 14px Montserrat";
        ctx.textAlign = "center";
        ctx.fillText("SCRATCH FOR SURPRISE", canvas.width/2, canvas.height/2);
    }

    function startMusic() {
        if (!musicStarted && MUSIC_MAP[musicId]) {
            const audio = document.getElementById('bg-music');
            audio.src = MUSIC_MAP[musicId];
            audio.play().catch(e => console.log("Audio blocked"));
            musicStarted = true;
        }
    }

    function scratch(e) {
        if (!isDrawing) return;
        startMusic();
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(clientX - rect.left, clientY - rect.top, 35, 0, Math.PI * 2);
        ctx.fill();
        checkScratchProgress();
    }

    function checkScratchProgress() {
        const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let clear = 0;
        for (let i = 3; i < pixels.length; i += 4) if (pixels[i] === 0) clear++;
        if (clear / (pixels.length / 4) > 0.5) {
            canvas.style.opacity = '0';
            setTimeout(() => canvas.remove(), 1000);
        }
    }

    window.onload = function() {
        // ВАЖНО: Строка хеша должна совпадать с Python-ботом!
        // f"{name_b64}{msg_b64}{is_vip}{music_id}{theme}{SECRET_SALT}"
        const checkString = nameBase64 + msgBase64 + vipParam + musicId + theme + SECRET_SALT;
        const calculatedHash = CryptoJS.MD5(checkString).toString();
        const watermark = document.getElementById('watermark');

        // Если хеш верный и VIP включен
        if (calculatedHash === receivedHash && vipParam === '1') {
            document.documentElement.setAttribute('data-vip', '1');
            if (watermark) watermark.remove();
        } else {
            if (watermark) watermark.style.display = 'block';
        }

        document.getElementById('nameDisplay').textContent = decodeBase64(nameBase64) || "Прекрасная Дама";
        const decodedMsg = decodeBase64(msgBase64);
        if (decodedMsg) document.getElementById('messageDisplay').textContent = decodedMsg;

        initCanvas();
    };

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, {passive: false});
</script>
</body>
</html>
