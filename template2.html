<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Твой сюрприз ✨</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: #ff9a9e; font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        .container { position: relative; width: 320px; height: 450px; }

        /* Нижний слой (Поздравление) */
        .card-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 25px;
            box-sizing: border-box; z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Верхний слой (Холст для стирания) */
        #scratch-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 20px; cursor: crosshair;
            z-index: 2; touch-action: none;
        }

        h1 { color: #d81b60; font-size: 1.8rem; margin: 10px 0; }
        #nameDisplay { color: #ad1457; font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; }
        
        /* Стили для текста сообщения */
        #messageDisplay { 
            color: #880e4f; 
            font-size: 1.1rem; 
            line-height: 1.4; 
            white-space: pre-wrap; /* Сохраняем переносы строк */
        }

        .hint { 
            position: absolute; bottom: -40px; color: white; width: 100%; 
            text-align: center; font-size: 0.9rem; opacity: 0.8; 
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-content">
        <h1>🌸 С 8 Марта!</h1>
        <div id="nameDisplay">Загрузка...</div>
        <div id="messageDisplay">Пусть этот день будет таким же сияющим и чудесным, как ты сама! ✨<br><br>💐💐💐</div>
    </div>
    
    <canvas id="scratch-canvas"></canvas>
    <div class="hint">Сотри защитный слой пальцем 👆</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nameBase64 = params.get('name');
    const msgBase64 = params.get('msg');

    // Функция декодирования
    function decodeBase64(str) {
        try {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch (e) { return null; }
    }

    // 1. Декодирование данных
    const decodedName = decodeBase64(nameBase64);
    const decodedMsg = decodeBase64(msgBase64);

    document.getElementById('nameDisplay').innerText = (decodedName || "Прекрасная Дама") + "!";
    
    if (decodedMsg && decodedMsg.trim() !== "") {
        document.getElementById('messageDisplay').innerText = decodedMsg;
    }

    // 2. Логика стирания
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        // Рисуем "защитный" слой (градиент под серебро)
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#d0d0d0');
        gradient.addColorStop(0.5, '#f0f0f0');
        gradient.addColorStop(1, '#b0b0b0');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Текстура блесток
        for(let i=0; i<400; i++) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }
        
        ctx.fillStyle = "#888";
        ctx.font = "bold 22px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ТВОЙ СЮРПРИЗ ТУТ", canvas.width/2, canvas.height/2);
    }

    function scratch(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.fill();
        
        checkScratchProgress();
    }

    function checkScratchProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        let clearPixels = 0;
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) clearPixels++;
        }
        
        if (clearPixels / (pixels.length / 4) > 0.45) {
            canvas.style.transition = 'opacity 0.8s';
            canvas.style.opacity = '0';
            setTimeout(() => canvas.remove(), 800);
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }
    }

    canvas.addEventListener('mousedown', () => isDrawing = true);
    canvas.addEventListener('touchstart', () => isDrawing = true);
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });

    window.onload = initCanvas;
</script>

</body>
</html>
