<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Arial', sans-serif; overflow: hidden; text-align: center;
        }

        /* Карточка открытки */
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px); z-index: 10;
            max-width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: #d81b60; font-size: 2.5rem; margin-bottom: 10px; }
        #nameDisplay { color: #ad1457; font-size: 2.2rem; font-weight: bold; display: block; margin-bottom: 20px; }
        
        /* Стили для текста сообщения */
        #messageDisplay { 
            font-size: 1.2rem; 
            color: #880e4f; 
            line-height: 1.5;
            white-space: pre-wrap; /* Чтобы сохранялись переносы строк из Telegram */
        }

        /* Анимация лепестков */
        .petal {
            position: absolute; background-color: #ffcce0;
            border-radius: 150% 0 150% 0; opacity: 0.7;
            pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1>С 8 Марта,</h1>
        <span id="nameDisplay">Загрузка...</span>
        <p id="messageDisplay">Пусть этот день будет наполнен цветами, <br> улыбками и весенним теплом! 🌸</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nameBase64 = params.get('name');
        const msgBase64 = params.get('msg'); // Новый параметр сообщения
        
        const display = document.getElementById('nameDisplay');
        const msgDisplay = document.getElementById('messageDisplay');

        // Функция безопасного декодирования Base64 (UTF-8)
        function decodeBase64(str) {
            try {
                return decodeURIComponent(atob(str).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                return null;
            }
        }

        // 1. Обработка Имени
        const decodedName = decodeBase64(nameBase64);
        display.innerText = (decodedName ? decodedName : "Прекрасная Дама") + "!";

        // 2. Обработка Сообщения
        const decodedMsg = decodeBase64(msgBase64);
        if (decodedMsg && decodedMsg.trim() !== "") {
            msgDisplay.innerText = decodedMsg;
        } else {
            // Если msg пустой, оставляем стандартный текст, который уже прописан в HTML
            msgDisplay.innerHTML = "Пусть этот день будет наполнен цветами, <br> улыбками и весенним теплом! 🌸";
        }

        // 3. Генерация лепестков
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const size = Math.random() * 15 + 10 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }
        setInterval(createPetal, 200);
    </script>
</body>
</html>
