<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b8860b, #fcf6ba, #aa8954);
            --soft-pink: #fff0f5;
            --deep-pink: #880e4f;
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            /* Фон с мягким свечением */
            background: radial-gradient(circle at center, #ffffff 0%, #ffe4e1 100%);
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; text-align: center;
        }

        /* Премиальная карточка */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            padding: 50px 40px;
            border-radius: 30px;
            /* Эффект стекла */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            /* Золотая тонкая рамка */
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08), 
                        inset 0 0 20px rgba(255,255,255,0.5);
            z-index: 10;
            max-width: 450px;
            width: 85%;
            animation: cardEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Декоративные золотые элементы */
        .card::before {
            content: ""; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid #d4af37; border-radius: 20px;
            opacity: 0.4; pointer-events: none;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: #4a4a4a; font-size: 1.8rem; margin: 0; 
            letter-spacing: 1px; font-weight: 400;
        }

        #nameDisplay { 
            font-family: 'Playfair Display', serif;
            /* Золотой текст */
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem; font-weight: 700; 
            display: block; margin: 15px 0 25px 0;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }
        
        #messageDisplay { 
            font-size: 1.1rem; 
            color: #5d5d5d; 
            line-height: 1.8;
            font-weight: 300;
            white-space: pre-wrap;
        }

        /* Улучшенные лепестки (Sakura Premium) */
        .petal {
            position: absolute; 
            background: linear-gradient(135deg, #ffcce0 0%, #ffb6c1 100%);
            border-radius: 100% 0 100% 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            opacity: 0.6;
            pointer-events: none; 
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1>С праздником весны,</h1>
        <span id="nameDisplay">Загрузка...</span>
        <p id="messageDisplay">Пусть ваша жизнь будет наполнена ароматом цветов, <br> искренними улыбками и нежностью. 🌸</p>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nameBase64 = params.get('name');
    const msgBase64 = params.get('msg');
    
    const display = document.getElementById('nameDisplay');
    const msgDisplay = document.getElementById('messageDisplay');

    // Ультимативная функция декодирования (Base64 -> UTF-8)
	function decodeBase64(str) {
		if (!str || str.trim() === "") return null;
		try {
			// 1. Превращаем urlsafe Base64 в обычный (заменяем - на + и _ на /)
			let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
			
			// 2. Добавляем недостающее дополнение "=" (padding)
			while (base64.length % 4 !== 0) {
				base64 += '=';
			}

			// 3. Декодируем в байты
			const binaryString = atob(base64);
			const bytes = new Uint8Array(binaryString.length);
			for (let i = 0; i < binaryString.length; i++) {
				bytes[i] = binaryString.charCodeAt(i);
			}
			
			// 4. Финальный UTF-8 текст
			return new TextDecoder("utf-8").decode(bytes);
		} catch (e) {
			console.error("Ошибка декодирования:", e);
			return null;
		}
	}

    // 1. Применяем имя
    const decodedName = decodeBase64(nameBase64);
    if (decodedName) {
        display.textContent = decodedName;
    } else {
        display.textContent = "Прекрасная Дама";
    }

    // 2. Применяем сообщение
    const decodedMsg = decodeBase64(msgBase64);
    if (decodedMsg && decodedMsg.trim() !== "") {
        msgDisplay.textContent = decodedMsg;
    }
    // Если decodedMsg null, в HTML останется ваш стандартный текст

    // 3. Анимация лепестков (оставляем без изменений)
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        const size = Math.random() * 12 + 8 + 'px';
        petal.style.width = size;
        petal.style.height = size;
        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = Math.random() * 5 + 5 + 's';
        petal.style.filter = `blur(${Math.random() * 2}px)`;
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 10000);
    }
    setInterval(createPetal, 400);
</script>
<div id="watermark" style="
    position: fixed; 
    bottom: 10px; 
    right: 10px; 
    font-family: Arial, sans-serif; 
    font-size: 12px; 
    color: rgba(0,0,0,0.3); 
    z-index: 9999;
    pointer-events: none;">
    Создано в @postcard_congrat_bot
</div>
</body>
</html>
