<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Arial', sans-serif; overflow: hidden; text-align: center;
        }

        /* Карточка открытки */
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px); z-index: 10;
            max-width: 90%;
        }

        h1 { color: #d81b60; font-size: 2.5rem; margin-bottom: 10px; }
        #nameDisplay { color: #ad1457; font-size: 2.2rem; font-weight: bold; display: block; margin-bottom: 20px; }
        p { font-size: 1.1rem; color: #880e4f; }

        /* Конверт и интерактив */
        #interactive-envelope {
            display: none; z-index: 20; text-align: center;
        }
        .envelope-img { width: 150px; cursor: pointer; transition: transform 0.3s; margin-bottom: 20px; }
        .envelope-img:hover { transform: scale(1.1) rotate(-5deg); }

        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; min-height: 150px; position: relative;
        }

        #btn-yes {
            background: #ff69b4; color: white; border: none;
            padding: 15px 35px; border-radius: 30px; cursor: pointer;
            font-size: 20px; font-weight: bold; transition: 0.2s; z-index: 100;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }

        #btn-no {
            background: white; color: #ff69b4; border: 2px solid #ff69b4;
            padding: 10px 25px; border-radius: 30px; cursor: pointer;
            font-size: 16px; transition: 0.2s; z-index: 99;
        }

        /* Анимация лепестков */
        .petal {
            position: absolute; background-color: #ffcce0;
            border-radius: 150% 0 150% 0; opacity: 0.7;
            pointer-events: none; animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="interactive-envelope">
        <img src="https://img.icons8.com/clouds/200/envelope.png" class="envelope-img">
        <h2 style="color: #d81b60;">У тебя секретное послание!<br>Откроешь?</h2>
        <div class="btn-container">
            <button id="btn-yes">ДА!</button>
            <button id="btn-no">Нет</button>
        </div>
    </div>

    <div class="card" id="main-card">
        <h1>С 8 Марта,</h1>
        <span id="nameDisplay">Загрузка...</span>
        <p>Пусть этот день будет наполнен цветами, <br> улыбками и весенним теплом! 🌸</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nameBase64 = params.get('name');
        const style = params.get('style');
        
        const mainCard = document.getElementById('main-card');
        const envelopePart = document.getElementById('interactive-envelope');
        const display = document.getElementById('nameDisplay');

        // 1. Декодирование имени
        if (nameBase64) {
            try {
                const decodedName = decodeURIComponent(atob(nameBase64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                display.innerText = decodedName + '!';
            } catch (e) {
                display.innerText = "Прекрасная Дама!";
            }
        } else {
            display.innerText = "Прекрасная Дама!";
        }

        // 2. Логика переключения стилей
        if (style === '2') {
            mainCard.style.display = 'none';
            envelopePart.style.display = 'block';
        }

        // 3. Игра с кнопками
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let noScale = 1;
        let yesScale = 1;

        function handleNo() {
            noScale -= 0.15;
            yesScale += 0.3;
            
            // Убегание кнопки
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.transform = `scale(${noScale})`;
            btnYes.style.transform = `scale(${yesScale})`;
            
            if (noScale <= 0.3) {
                btnNo.style.opacity = '0';
                setTimeout(() => btnNo.remove(), 200);
            }
        }

        btnNo.addEventListener('mouseover', handleNo);
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); handleNo(); });

        btnYes.addEventListener('click', () => {
            envelopePart.style.opacity = '0';
            setTimeout(() => {
                envelopePart.style.display = 'none';
                mainCard.style.display = 'block';
                mainCard.style.animation = 'fall 0.5s reverse'; // Плавное появление
            }, 300);
        });

        // 4. Лепестки
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const size = Math.random() * 15 + 10 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }
        setInterval(createPetal, 200);
    </script>
</body>
</html>
