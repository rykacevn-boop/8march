<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ */
        :root { 
            --gold-grad: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
            --pink-grad: linear-gradient(135deg, #ff758f 0%, #ffb3c1 45%, #ff4d6d 100%);
        }
        
        /* ОБЫЧНАЯ ТЕМА — ТЕПЕРЬ РОЗОВАЯ */
        body:not([data-vip="1"]), 
        [data-vip="0"] {
            --bg: #fff0f3 !important;
            --text: #c9184a !important;
            --glass: rgba(255, 255, 255, 0.8) !important;
            --accent: #ff4d6d !important;
            --main-grad: var(--pink-grad) !important;
            --border-color: #ff85a2 !important;
        }

        /* VIP ТЕМА — ТЕПЕРЬ ЗОЛОТАЯ */
        [data-vip="1"] {
            --bg: #1a1a1a !important; /* Темный премиальный фон для золота */
            --glass: rgba(40, 40, 40, 0.9) !important;
            --text: #fcf6ba !important;
            --accent: #d4af37 !important;
            --main-grad: var(--gold-grad) !important;
            --border-color: #d4af37 !important;
        }

        /* СКРЫТИЕ ВОТЕРМАРКА ПРИ VIP */
        [data-vip="1"] #watermark {
            display: none !important;
        }

        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s ease;
        }

        canvas { 
            display: block; 
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                              url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg'); 
            background-size: cover;
            border: 4px solid var(--border-color); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }

        .gradient-text {
            background: var(--main-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .mission-sidebar {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 160px; background: var(--glass); padding: 20px;
            border-radius: 20px; border-left: 5px solid var(--accent);
            backdrop-filter: blur(10px); z-index: 5; color: var(--text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .ink-bar { 
            width: 200px; height: 12px; background: rgba(0,0,0,0.1); 
            border-radius: 10px; border: 1.5px solid var(--accent); overflow: hidden; 
        }
        
        #ink-progress { 
            background: var(--main-grad); 
            height: 100%;
            transition: width 0.1s linear;
        }
        
        #reset-btn { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            padding: 14px 35px; background: var(--main-grad); border: none; color: #000; 
            border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 20; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 0.9rem;
        }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 40px; border-radius: 40px; width: 300px; text-align: center; z-index: 100; 
            background: var(--glass); border: 2px solid var(--accent); 
            backdrop-filter: blur(15px); color: var(--text);
        }
        
        .card-name { font-size: 2.2rem; margin: 15px 0; font-family: 'Playfair Display', serif; display: block; }

        #watermark {
            position: fixed; bottom: 15px; right: 15px;
            font-size: 10px; color: rgba(128, 128, 128, 0.6);
            z-index: 9999;
        }

        .ui-card {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass); padding: 15px 25px;
            border-radius: 20px; border: 2px solid var(--accent);
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }

		/* АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ */
				@media (max-width: 768px) {
					/* Переносим боковую панель вниз и делаем ее компактной */
					.mission-sidebar {
						top: auto; 
						bottom: 80px; 
						left: 50%; 
						transform: translateX(-50%);
						width: 90%; 
						padding: 10px; 
						border-left: none; 
						border-bottom: 3px solid var(--accent);
						text-align: center; 
						box-sizing: border-box;
					}
					.mission-sidebar h3 { display: none; } /* Скрываем заголовок "Твоя цель" для экономии места */
					.mission-sidebar p { margin: 0; font-size: 0.85rem; }
					
					/* Уменьшаем верхнюю карточку */
					.ui-card { 
						top: 10px; 
						padding: 10px; 
						width: 90%; 
						box-sizing: border-box; 
					}
					.ui-card .gradient-text { font-size: 1.1rem; }
					.ink-bar { width: 100%; } /* Полоска чернил на всю ширину карточки */
					
					/* Сдвигаем кнопку сброса */
					#reset-btn { 
						bottom: 20px; 
						padding: 10px 25px; 
						font-size: 0.8rem;
					}
				}
    </style>
</head>
<body>

    <div class="mission-sidebar">
        <h3 style="margin-top:0">Твоя цель:</h3>
        <p>Нарисуй путь для <b>пчёлки</b>, чтобы она долетела до <b>цветка</b>. Запас пыльцы ограничен!</p>
    </div>

    <div class="ui-card">
        <div class="gradient-text" style="font-weight: bold; margin-bottom: 5px;">С Праздником 8 Марта! ✨</div>
        <div class="ink-bar">
            <div id="ink-progress" style="width: 100%;"></div>
        </div>
    </div>

    <button id="reset-btn" onclick="resetLevel()" disabled>СНАЧАЛА ⟲</button>
    <canvas id="game"></canvas>

    <div class="card" id="final-card">
        <span style="font-size: 1.1rem;">Для тебя,</span>
        <span class="card-name gradient-text" id="nameDisplay"></span>
        <p id="messageDisplay" style="line-height: 1.5;"></p>
        <button onclick="resetLevel()" style="background: var(--main-grad); color: #000; padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px;">
            ЕЩЕ РАЗ ✨
        </button>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

	<script>
        const SECRET_SALT = "MySuperSecret8March2026"; 
        
        // 1. Добавь мапу с твоими рабочими ссылками
        const MUSIC_MAP = {
            "1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
            "4": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Labrinth_-_Still_Dont_Know_My_Name_67181174.mp3",
            "5": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Rihanna_-_Kiss_It_Better_48112885.mp3",
            "6": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Aarne_Toxi_Big_Baby_Tape_-_NOBODY_80172673.mp3"
        };

        const params = new URLSearchParams(window.location.search);
        const nameB64 = params.get('name') || "";
        const msgB64 = params.get('msg') || "";
        const vip = params.get('vip') || "0";
        const musicId = params.get('music') || "0";
        const theme = params.get('theme') || "light";
        const receivedHash = params.get('hash') || "";

        // 2. Логика запуска музыки
        let musicStarted = false;
        function startMusic() {
            if (!musicStarted && MUSIC_MAP[musicId]) {
                const audio = document.getElementById('bg-music');
                audio.src = MUSIC_MAP[musicId];
                audio.play().catch(e => console.log("Браузер заблокировал автоплей"));
                musicStarted = true;
            }
        }

        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }

        // --- ФИЗИКА ---
        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const beeImg = new Image();
        beeImg.src = 'https://raw.githubusercontent.com/rykacevn-boop/8march/main/image-Photoroom%20(18).png';

		function resize() {
            canvas.width = Math.min(window.innerWidth * 0.95, 800);
            // Если экран узкий (телефон), отдаем под игру 60% высоты, иначе 75%
            const heightFactor = window.innerWidth < 768 ? 0.6 : 0.75;
            canvas.height = Math.min(window.innerHeight * heightFactor, 600);
        }
        resize();

        let maxInk = canvas.width * 1.5, ink = maxInk, isDrawing = false, lastPos = null, isDone = false;

        const bee = Bodies.circle(70, 100, 25, { restitution: 0.3, label: 'bee', isStatic: true });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        Composite.add(engine.world, [bee, flower, Bodies.rectangle(canvas.width/2, canvas.height + 15, canvas.width, 30, { isStatic: true })]);

        function resetLevel() {
            isDone = false; document.getElementById('final-card').style.display = 'none';
            document.getElementById('reset-btn').disabled = true;
            Composite.allBodies(engine.world).forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });
            Body.setStatic(bee, true); Body.setPosition(bee, { x: 70, y: 100 }); Body.setVelocity(bee, { x: 0, y: 0 });
            ink = maxInk; document.getElementById('ink-progress').style.width = '100%';
        }

        function run() {
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim();

            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'line') {
                    ctx.beginPath(); body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                    ctx.fillStyle = accent; ctx.fill();
                }
                if (body.label === 'bee') {
                    ctx.save(); ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle); ctx.drawImage(beeImg, -30, -30, 60, 60); ctx.restore();
                }
            });
            ctx.font = '50px Arial'; ctx.fillText('🌸', flower.position.x - 25, flower.position.y + 20);
            requestAnimationFrame(run);
        }

        canvas.addEventListener('mousedown', (e) => {
			startMusic();
            isDrawing = true; const rect = canvas.getBoundingClientRect();
            lastPos = { x: (e.clientX || e.touches?.[0].clientX) - rect.left, y: (e.clientY || e.touches?.[0].clientY) - rect.top };
            if (bee.isStatic) { Body.setStatic(bee, false); document.getElementById('reset-btn').disabled = false; }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0].clientX) - rect.left;
            const y = (e.clientY || e.touches?.[0].clientY) - rect.top;
            const dist = Vector.magnitude(Vector.sub({x, y}, lastPos));
            if (dist > 10) {
                const angle = Math.atan2(y - lastPos.y, x - lastPos.x);
                Composite.add(engine.world, Bodies.rectangle((x+lastPos.x)/2, (y+lastPos.y)/2, dist+2, 6, { isStatic: true, angle, label: 'line' }));
                ink -= dist; document.getElementById('ink-progress').style.width = (ink/maxInk)*100 + '%';
                lastPos = {x, y};
            }
        });

        window.addEventListener('mouseup', () => isDrawing = false);

		canvas.addEventListener('touchstart', () => {
					startMusic();
				}, {passive: true});

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if ((pair.bodyA.label === 'bee' && pair.bodyB.label === 'flower') || (pair.bodyB.label === 'bee' && pair.bodyA.label === 'flower')) {
                    if (!isDone) { isDone = true; setTimeout(() => document.getElementById('final-card').style.display = 'block', 500); }
                }
            });
        });

        window.onload = () => {
            document.getElementById('nameDisplay').textContent = decode(nameB64);
            document.getElementById('messageDisplay').textContent = decode(msgB64);

            // Проверка хеша (строго как в Python)
            const checkString = nameB64 + msgB64 + vip + musicId + theme + SECRET_SALT;
            const calculatedHash = CryptoJS.MD5(checkString).toString();
            
            if (vip === '1' && calculatedHash === receivedHash) {
                document.body.setAttribute('data-vip', '1');
            } else {
                document.body.setAttribute('data-vip', '0');
            }
            run();
        };
    </script>
</body>
</html>
