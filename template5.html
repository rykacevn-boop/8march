<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта — Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-pink: #ff85a2; 
            --deep-pink: #d1305c; 
            --gold: #d4af37; 
            --text: #4a4a4a; 
            --bg-page: #fff5f8;
            --sidebar-bg: rgba(255, 255, 255, 0.85);
            --card-bg: white;
            --canvas-bg: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), 
                         url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg');
        }

        [data-theme="dark"] {
            --bg-page: #0a0a0a;
            --text: #e0e0e0;
            --sidebar-bg: rgba(20, 20, 20, 0.9);
            --card-bg: #111;
            --canvas-bg: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                         url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg');
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-page);
            display: flex; justify-content: center; align-items: center;
            touch-action: none; -webkit-user-select: none; user-select: none;
            transition: background 0.8s ease;
        }

        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        canvas { 
            display: block; 
            background-image: var(--canvas-bg); 
            background-size: cover; background-position: center;
            border: 4px solid var(--gold); border-radius: 30px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.5); z-index: 1;
        }

        .mission-sidebar {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 170px; background: var(--sidebar-bg); padding: 25px;
            border-radius: 20px; border-left: 5px solid var(--gold);
            backdrop-filter: blur(10px); z-index: 5; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .mission-sidebar h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin: 0 0 10px 0; color: var(--gold); }
        .mission-sidebar p { font-size: 0.85rem; margin: 0; color: var(--text); line-height: 1.5; }

        .ui { position: absolute; top: 30px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .title { font-family: 'Playfair Display', serif; color: var(--text); font-size: 1.6rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-bottom: 10px; }
        
        .ink-bar { width: 220px; height: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; margin: 0 auto; }
        #ink-progress { width: 100%; height: 100%; background: linear-gradient(to right, #bf953f, #fcf6ba, #d4af37); transition: width 0.1s ease-out; }
        
        #reset-btn { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            padding: 14px 40px; background: linear-gradient(145deg, #bf953f, #aa8954); border: none; color: white; 
            border-radius: 50px; font-weight: bold; cursor: pointer; pointer-events: auto; z-index: 20; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); font-size: 0.9rem; letter-spacing: 1px;
        }
        #reset-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 45px; border-radius: 35px; width: 300px; text-align: center; z-index: 100; 
            background: var(--card-bg); border: 2px solid var(--gold); box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -55%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        .card-name { color: var(--gold); font-size: 2.4rem; font-weight: 700; display: block; margin: 15px 0; font-family: 'Playfair Display', serif; }
        .card p { line-height: 1.8; color: var(--text); font-size: 1.05rem; }
        .card button { padding: 15px 35px; border: none; background: var(--gold); color: black; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 25px; }

        #watermark { position: fixed; bottom: 10px; right: 10px; font-size: 11px; color: rgba(128,128,128,0.5); z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div class="mission-sidebar">
        <h3>Premium Garden</h3>
        <p>Нарисуй золотой путь для <b>пчёлки</b>. Пыльца — это магия, используй её мудро!</p>
    </div>

    <div id="canvas-container">
        <div class="ui">
            <div class="title" id="mainTitle">С Праздником 8 Марта! ✨</div>
            <div class="ink-bar"><div id="ink-progress"></div></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()" disabled>СНАЧАЛА 🔄</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 style="margin:0; font-size: 1.2rem; color: var(--gold);">С восхищением,</h1>
        <span class="card-name" id="nameDisplay"></span>
        <p id="messageDisplay"></p>
        <button onclick="resetLevel()">ЕЩЕ РАЗ ✨</button>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

    <script>
        const SECRET_SALT = "MySuperSecret8March2026"; 
        const MUSIC_MAP = {
            "1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
        };

        const params = new URLSearchParams(window.location.search);
        const nameB64 = params.get('name') || "";
        const msgB64 = params.get('msg') || "";
        const vip = params.get('vip') || "0";
        const theme = params.get('theme') || "light";
        const musicId = params.get('music') || "0";
        const receivedHash = params.get('hash') || "";

        let musicStarted = false;
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }

        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.55; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('reset-btn');
        const beeImg = new Image();
        beeImg.src = 'https://raw.githubusercontent.com/rykacevn-boop/8march/main/image-Photoroom%20(18).png';

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.92, 800);
            canvas.height = Math.min(window.innerHeight * 0.72, 600);
        }
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false, animationId = null;

        const bee = Bodies.circle(70, 100, 25, { restitution: 0.3, friction: 0.1, label: 'bee', isStatic: true, inertia: Infinity });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        Composite.add(engine.world, [bee, flower, Bodies.rectangle(canvas.width/2, canvas.height + 15, canvas.width, 30, { isStatic: true })]);

        function resetLevel() {
            if (animationId) cancelAnimationFrame(animationId);
            resetBtn.disabled = true; isDone = false; isDrawing = false;
            document.getElementById('final-card').style.display = 'none';
            Composite.allBodies(engine.world).forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });
            Body.setStatic(bee, true); Body.setPosition(bee, { x: 70, y: 100 }); Body.setVelocity(bee, { x: 0, y: 0 });
            ink = maxInk; document.getElementById('ink-progress').style.width = '100%';
            run();
        }

        function run() {
            if (isDone) return; 
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'line') {
                    ctx.beginPath(); body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                    ctx.fillStyle = theme === 'dark' ? '#fcf6ba' : '#d4af37';
                    ctx.shadowBlur = theme === 'dark' ? 15 : 8; 
                    ctx.shadowColor = 'rgba(212, 175, 55, 0.8)';
                    ctx.fill(); ctx.shadowBlur = 0;
                }
                if (body.label === 'bee') {
                    ctx.save(); ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle); ctx.drawImage(beeImg, -30, -30, 60, 60);
                    ctx.restore();
                }
            });
            ctx.font = '58px Arial'; ctx.textAlign = 'center';
            ctx.fillText('🌸', flower.position.x, flower.position.y);
            animationId = requestAnimationFrame(run);
        }

        const startDraw = (e) => {
            if (isDone) return;
            if (!musicStarted && MUSIC_MAP[musicId]) {
                const audio = document.getElementById('bg-music');
                audio.src = MUSIC_MAP[musicId]; audio.play().catch(()=>{});
                musicStarted = true;
            }
            isDrawing = true; lastPos = getPos(e);
            if (bee.isStatic) { Body.setStatic(bee, false); resetBtn.disabled = false; }
            if(e.cancelable) e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e); if (!lastPos) return;
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 8) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 8, { 
                    isStatic: true, 
                    angle: Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x), 
                    label: 'line', friction: 0.1 
                });
                Composite.add(engine.world, segment);
                ink -= dist; document.getElementById('ink-progress').style.width = Math.max(0, (ink/maxInk)*100) + '%';
                lastPos = currentPos;
            }
        };

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const cy = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            return { x: cx - rect.left, y: cy - rect.top };
        }

        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower') && !isDone) {
                    isDone = true; 
                    setTimeout(() => { document.getElementById('final-card').style.display = 'block'; }, 400);
                }
            });
        });

        window.onload = function() {
            document.getElementById('nameDisplay').textContent = decode(nameB64);
            document.getElementById('messageDisplay').textContent = decode(msgB64);
            const check = nameB64 + msgB64 + vip + musicId + theme + SECRET_SALT;
            const hash = CryptoJS.MD5(check).toString();
            if (vip === '1' && hash === receivedHash) {
                document.getElementById('watermark').remove();
                if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.getElementById('watermark').style.display = 'block';
            }
            run();
        };
    </script>
</body>
</html>
