<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --deep-pink: #d1305c;
            --gold: #d4af37;
            --text: #4a4a4a;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            
            /* --- ГЕНЕРАЦИЯ ФОНА --- */
            background: 
                /* Слой 1: Детализированный цветочный узор (SVG) */
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100"><g fill-opacity="0.05"><path d="M10,10 q 15,-15 30,0 t 30,0 30,0" fill="none" stroke="%23ff85a2" stroke-width="0.5"/><path d="M10,90 q 15,15 30,0 t 30,0 30,0" fill="none" stroke="%23d4af37" stroke-width="0.5"/><circle fill="%23d4af37" cx="50" cy="50" r="1"/></g></svg>'),
                /* Слой 2: Мягкий радиальный градиент */
                radial-gradient(circle at center, #ffffff 0%, #ffe4e1 100%);
            background-size: 200px 200px, 100% 100%;
            /* --------------------- */
            
            overflow: hidden;
            font-family: 'Montserrat', sans-serif; text-align: center; color: var(--text);
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        
        /* Золотая рамка и фон холста */
        canvas { 
            display: block; touch-action: none; cursor: crosshair; 
            background: rgba(255, 255, 255, 0.5); /* Матовое стекло */
            backdrop-filter: blur(8px);
            border: 2px solid var(--gold); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        
        /* Заголовок в стиле 'Playfair Display' */
        .title {
            font-family: 'Playfair Display', serif; color: var(--text);
            font-size: 1.5rem; font-weight: 700; margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
        }

        /* Улучшенная полоска чернил (золото + розовый) */
        .ink-bar {
            width: 200px; height: 12px; background: rgba(212, 175, 55, 0.2); 
            margin: 8px auto; border-radius: 6px; border: 2px solid var(--gold); overflow: hidden;
        }
        #ink-progress { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s ease-out; }

        /* Кнопка сброса (Золотая с тенью) */
        #reset-btn {
            position: absolute; bottom: 30px; left: 20px;
            padding: 12px 25px; background: var(--gold); border: none;
            color: white; border-radius: 10px; font-family: 'Montserrat', sans-serif;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            pointer-events: auto; z-index: 20;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); transition: 0.3s ease;
        }
        #reset-btn:hover { background: #b8972e; box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4); }

        /* Финальная открытка (Стекло, золото и цветы) */
        .card {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); padding: 50px 40px;
            border-radius: 30px; width: 300px; text-align: center;
            z-index: 100; border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px); /* Эффект матового стекла */
            box-shadow: 0 25px 50px rgba(0,0,0,0.08); /* Глубокая тень */
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translate(-50%, -40%); }
            to { opacity: 1; transform: scale(1) translate(-50%, -50%); }
        }

        .card-title { font-family: 'Playfair Display', serif; color: var(--text); font-size: 2rem; margin: 0 0 15px 0; }
        .card-name { color: var(--primary-pink); font-size: 2.8rem; font-weight: 700; display: block; margin-bottom: 20px; }
        .card-text { font-size: 1.1rem; line-height: 1.8; color: #666; white-space: pre-wrap; }
        
        .card button {
            padding: 15px 30px; border: none; background: var(--primary-pink);
            color: white; border-radius: 15px; font-family: 'Montserrat', sans-serif;
            font-weight: bold; font-size: 1.2rem; margin-top: 25px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.3); transition: 0.3s ease;
        }
        .card button:hover { background: var(--deep-pink); }
        
        /* --- ДЕКОРАТИВНЫЕ ОБЪЕКТЫ --- */
        .flower-ornament {
            position: absolute; width: 150px; height: 150px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,10 a 20,20 0 1,0 0,40 a 20,20 0 1,0 0,-40 M30,15 a 15,15 0 1,0 0,30 a 15,15 0 1,0 0,-30 M15,30 a 15,15 0 1,0 30,0 a 15,15 0 1,0 -30,0" fill="none" stroke="%23ff85a2" stroke-width="1"/></svg>');
            background-size: contain; opacity: 0.2; z-index: -1;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="flower-ornament" style="top: -20px; left: -20px; transform: rotate(0deg);"></div>
        <div class="flower-ornament" style="bottom: -20px; right: -20px; transform: rotate(180deg);"></div>
        
        <div class="ui">
            <div class="title">Королевский сад 🌺</div>
            <div style="color: var(--text); font-weight: 700;">РИСУЙ ПУТЬ ПАЛЬЦЕМ ✍️</div>
            <div class="ink-bar"><div id="ink-progress"></div></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()">СНАЧАЛА 🔄</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 class="card-title">С праздником,</h1>
        <span class="card-name" id="nameDisplay"></span>
        <p class="card-text" id="messageDisplay"></p>
        <button onclick="location.reload()">ПОПРОБОВАТЬ СНОВА</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.6; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false;

        const bee = Bodies.circle(60, 100, 18, { restitution: 0.4, friction: 0.1, label: 'bee', isStatic: true });
        const flower = Bodies.circle(canvas.width - 60, canvas.height - 100, 35, { isStatic: true, label: 'flower' });
        const ground = Bodies.rectangle(canvas.width/2, canvas.height + 10, canvas.width, 20, { isStatic: true });
        Composite.add(engine.world, [bee, flower, ground]);

        function resetLevel() {
            const allBodies = Composite.allBodies(engine.world);
            allBodies.forEach(body => {
                if (body.label === 'line') Composite.remove(engine.world, body);
            });
            Body.setStatic(bee, true);
            Body.setPosition(bee, { x: 60, y: 100 });
            Body.setVelocity(bee, { x: 0, y: 0 });
            Body.setAngularVelocity(bee, 0);
            ink = maxInk;
            document.getElementById('ink-progress').style.width = '100%';
            isDone = false;
        }

        function run() {
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            Composite.allBodies(engine.world).forEach(body => {
                ctx.beginPath();
                body.vertices.forEach((v, i) => ctx.lineTo(v.x, v.y));
                ctx.closePath();
                
                if (body.label === 'line') {
                    // Золотая линия с градиентом
                    const gradient = ctx.createLinearGradient(body.bounds.min.x, body.bounds.min.y, body.bounds.max.x, body.bounds.max.y);
                    gradient.addColorStop(0, '#d4af37'); // Золото
                    gradient.addColorStop(1, '#ff85a2'); // Розовый
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(212, 175, 55, 0.5)';
                }
                else if (body.isStatic && body.label !== 'bee') {
                    ctx.fillStyle = '#d4af37'; // Золотые препятствия
                    ctx.shadowBlur = 0;
                }
                else { ctx.fillStyle = 'transparent'; ctx.shadowBlur = 0; }
                
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '36px Arial'; ctx.fillText('🐝', bee.position.x, bee.position.y);
            
            // Цветок со свечением
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff69b4';
            ctx.font = '55px Arial'; ctx.fillText('🌸', flower.position.x, flower.position.y);
            ctx.shadowBlur = 0;

            if (!isDone) requestAnimationFrame(run);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const startDraw = (e) => {
            if (isDone) return;
            isDrawing = true;
            lastPos = getPos(e);
            if (bee.isStatic) Body.setStatic(bee, false);
            if(e.cancelable) e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e);
            if (!lastPos) return;

            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 10) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 6, {
                    isStatic: true, angle: angle, label: 'line', friction: 0.1
                });
                Composite.add(engine.world, segment);
                ink -= dist;
                document.getElementById('ink-progress').style.width = Math.max(0, (ink / maxInk) * 100) + '%';
                lastPos = currentPos;
            }
        };

        const stopDraw = () => { isDrawing = false; lastPos = null; };

        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', stopDraw);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower')) {
                    isDone = true;
                    document.getElementById('final-card').style.display = 'block';
                }
            });
        });

        run();
    </script>
</body>
</html>
