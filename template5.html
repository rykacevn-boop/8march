<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --deep-pink: #d1305c; --gold: #d4af37; --text: #4a4a4a; }
        body { margin: 0; padding: 0; height: 100vh; background: radial-gradient(circle at center, #ffffff 0%, #ffe4e1 100%); overflow: hidden; font-family: 'Montserrat', sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); border: 2px solid var(--gold); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .title { font-family: 'Playfair Display', serif; color: var(--text); font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .ink-bar { width: 200px; height: 10px; background: rgba(212, 175, 55, 0.2); margin: 8px auto; border-radius: 5px; border: 1px solid var(--gold); overflow: hidden; }
        #ink-progress { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s ease-out; }
        #reset-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 30px; background: var(--gold); border: none; color: white; border-radius: 50px; font-weight: bold; cursor: pointer; pointer-events: auto; z-index: 20; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .card { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 40px; border-radius: 30px; width: 300px; text-align: center; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 2px solid var(--gold); }
        .card-name { color: var(--primary-pink); font-size: 2.2rem; font-weight: 700; display: block; margin: 10px 0; font-family: 'Playfair Display', serif; }
        .card button { padding: 15px 30px; border: none; background: var(--primary-pink); color: white; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="ui">
            <div class="title">Королевский сад 🌺</div>
            <div class="ink-bar"><div id="ink-progress"></div></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()">СНАЧАЛА 🔄</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 style="margin:0; font-size: 1.2rem;">С праздником!</h1>
        <span class="card-name" id="nameDisplay"></span>
        <p id="messageDisplay" style="line-height: 1.6;"></p>
        <button onclick="resetLevel()">ЕЩЕ РАЗ ✨</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.6; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.95, 800);
            canvas.height = Math.min(window.innerHeight * 0.8, 600);
        }
        window.addEventListener('resize', resize);
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false, animationId = null;

        const bee = Bodies.circle(60, 100, 18, { restitution: 0.3, friction: 0.1, label: 'bee', isStatic: true, inertia: Infinity });
        const flower = Bodies.circle(canvas.width - 60, canvas.height - 100, 35, { isStatic: true, label: 'flower' });
        const ground = Bodies.rectangle(canvas.width/2, canvas.height + 10, canvas.width, 20, { isStatic: true });
        Composite.add(engine.world, [bee, flower, ground]);

        function resetLevel() {
            // ОСТАНАВЛИВАЕМ СТАРЫЙ ЦИКЛ ПЕРЕД СБРОСОМ
            if (animationId) cancelAnimationFrame(animationId);
            
            isDone = false;
            isDrawing = false;
            document.getElementById('final-card').style.display = 'none';
            
            // Удаляем линии
            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });

            // Полный сброс пчелы
            Body.setStatic(bee, true);
            Body.setPosition(bee, { x: 60, y: 100 });
            Body.setVelocity(bee, { x: 0, y: 0 });
            Body.setAngularVelocity(bee, 0);
            Body.setAngle(bee, 0);
            
            // Сброс UI
            ink = maxInk;
            document.getElementById('ink-progress').style.width = '100%';

            // ЗАПУСКАЕМ ЧИСТЫЙ ЦИКЛ
            run();
        }

        function run() {
            // Если игра уже закончена, не запускаем новый кадр
            if (isDone) return; 

            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            Composite.allBodies(engine.world).forEach(body => {
                ctx.beginPath();
                body.vertices.forEach((v, i) => ctx.lineTo(v.x, v.y));
                ctx.closePath();
                if (body.label === 'line') {
                    ctx.fillStyle = '#d4af37';
                    ctx.shadowBlur = 4; ctx.shadowColor = '#d4af37';
                } else if (body.isStatic && body.label !== 'bee') {
                    ctx.fillStyle = '#d4af37';
                } else { ctx.fillStyle = 'transparent'; }
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '36px Arial'; ctx.fillText('🐝', bee.position.x, bee.position.y);
            ctx.font = '55px Arial'; ctx.fillText('🌸', flower.position.x, flower.position.y);

            animationId = requestAnimationFrame(run);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const startDraw = (e) => {
            if (isDone) return;
            isDrawing = true; lastPos = getPos(e);
            if (bee.isStatic) Body.setStatic(bee, false);
            if(e.cancelable) e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e);
            if (!lastPos) return;
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 10) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 6, { isStatic: true, angle: angle, label: 'line', friction: 0.1 });
                Composite.add(engine.world, segment);
                ink -= dist;
                document.getElementById('ink-progress').style.width = Math.max(0, (ink/maxInk)*100) + '%';
                lastPos = currentPos;
            }
        };

        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower') && !isDone) {
                    isDone = true;
                    document.getElementById('final-card').style.display = 'block';
                }
            });
        });

        run();
    </script>
</body>
</html>
