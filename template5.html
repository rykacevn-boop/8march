<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --primary-pink: #ff85a2; --deep-pink: #d1305c; --gold: #d4af37; --text: #4a4a4a; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            touch-action: none; -webkit-user-select: none; user-select: none;
            
            /* --- НАСТРОЙКА ВАШЕГО ФОНА --- */
            background-image: url('https://github.com/rykacevn-boop/8march/blob/2c649da7ac9f2f2fe0824d6325694f2c1a4ee798/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg'); /* ЗАМЕНИТЕ ЭТУ ССЫЛКУ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* ---------------------------- */
        }

        /* Затемнение фона, чтобы игра читалась лучше */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); /* 20% белого поверх фото для мягкости */
            z-index: -1;
        }

        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        canvas { 
            display: block; 
            background: rgba(255, 255, 255, 0.4); /* Эффект матового стекла поверх вашего фото */
            backdrop-filter: blur(12px); 
            border: 2px solid var(--gold); border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
        }

        .ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .title { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.6rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        .ink-bar { width: 220px; height: 12px; background: rgba(0,0,0,0.2); margin: 10px auto; border-radius: 6px; border: 1.5px solid var(--gold); overflow: hidden; }
        #ink-progress { width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff); transition: width 0.1s ease-out; }

        #reset-btn { 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            padding: 14px 35px; background: var(--gold); border: none; color: white; 
            border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; 
            pointer-events: auto; z-index: 20; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.5); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #reset-btn:active { transform: translateX(-50%) scale(0.9); }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 40px; border-radius: 35px; width: 310px; text-align: center; z-index: 100; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); border: 3px solid var(--gold);
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -60%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        .card-name { color: var(--primary-pink); font-size: 2.4rem; font-weight: 700; display: block; margin: 15px 0; font-family: 'Playfair Display', serif; }
        .card button { padding: 16px 35px; border: none; background: var(--primary-pink); color: white; border-radius: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4); }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="ui">
            <div class="title">С Праздником 8 Марта! ✨</div>
            <div class="ink-bar"><div id="ink-progress"></div></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()">СНАЧАЛА 🔄</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 style="margin:0; font-size: 1.3rem; color: #555;">Для тебя,</h1>
        <span class="card-name" id="nameDisplay"></span>
        <p id="messageDisplay" style="line-height: 1.7; color: #666; font-size: 1.1rem;"></p>
        <button onclick="resetLevel()">ПОПРОБОВАТЬ ЕЩЕ 🌸</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.55; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.92, 800);
            canvas.height = Math.min(window.innerHeight * 0.75, 600);
        }
        window.addEventListener('resize', resize);
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false, animationId = null;

        const bee = Bodies.circle(70, 100, 18, { restitution: 0.3, friction: 0.1, label: 'bee', isStatic: true, inertia: Infinity });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        const ground = Bodies.rectangle(canvas.width/2, canvas.height + 15, canvas.width, 30, { isStatic: true });
        Composite.add(engine.world, [bee, flower, ground]);

        function resetLevel() {
            if (animationId) cancelAnimationFrame(animationId);
            isDone = false; isDrawing = false;
            document.getElementById('final-card').style.display = 'none';
            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });

            Body.setStatic(bee, true);
            Body.setPosition(bee, { x: 70, y: 100 });
            Body.setVelocity(bee, { x: 0, y: 0 });
            Body.setAngle(bee, 0);
            
            ink = maxInk;
            document.getElementById('ink-progress').style.width = '100%';
            run();
        }

        function run() {
            if (isDone) return; 
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            Composite.allBodies(engine.world).forEach(body => {
                ctx.beginPath();
                body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                ctx.closePath();
                if (body.label === 'line') {
                    ctx.fillStyle = '#d4af37';
                    ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                } else if (body.isStatic && body.label !== 'bee') {
                    ctx.fillStyle = 'rgba(212, 175, 55, 0.8)';
                } else { ctx.fillStyle = 'transparent'; }
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '38px Arial'; ctx.fillText('🐝', bee.position.x, bee.position.y);
            ctx.font = '58px Arial'; ctx.fillText('🌸', flower.position.x, flower.position.y);

            animationId = requestAnimationFrame(run);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const startDraw = (e) => {
            if (isDone) return;
            isDrawing = true; lastPos = getPos(e);
            if (bee.isStatic) Body.setStatic(bee, false);
            if(e.cancelable) e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e);
            if (!lastPos) return;
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 8) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 7, { isStatic: true, angle: angle, label: 'line', friction: 0.1 });
                Composite.add(engine.world, segment);
                ink -= dist;
                document.getElementById('ink-progress').style.width = Math.max(0, (ink/maxInk)*100) + '%';
                lastPos = currentPos;
            }
        };

        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower') && !isDone) {
                    isDone = true;
                    setTimeout(() => { document.getElementById('final-card').style.display = 'block'; }, 300);
                }
            });
        });

        run();
    </script>
</body>
</html>
