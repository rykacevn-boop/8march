<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВЫЕ ПЕРЕМЕННЫЕ (Обычная тема) */
        :root { 
            --primary-pink: #ff85a2; 
            --deep-pink: #d1305c; 
            --gold: #d4af37; 
            --gold-grad: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
            --bg: #fff5f8;
            --text: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.8);
            --btn-text: #000000;
            --canvas-shadow: rgba(0,0,0,0.15);
        }

        /* ПРЕМИУМ ТЕМА (VIP 1) */
        [data-vip="1"] {
            --bg: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            --glass: rgba(30, 30, 30, 0.9);
            --text: #ffffff;
            --primary-pink: #d4af37;
            --deep-pink: #fcf6ba;
            --btn-text: #000000;
            --canvas-shadow: rgba(212, 175, 55, 0.4);
        }

        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s ease;
        }

        /* ОФОРМЛЕНИЕ ИГРОВОГО ПОЛЯ */
        canvas { 
            display: block; 
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                              url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg'); 
            background-size: cover;
            border: 4px solid var(--gold); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px var(--canvas-shadow); 
            transition: box-shadow 0.5s ease;
        }

        [data-vip="1"] canvas {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg');
        }

        .gold-text-effect {
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* САЙДБАР И ИНТЕРФЕЙС */
        .mission-sidebar {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 160px; background: var(--glass); padding: 20px;
            border-radius: 20px; border-left: 5px solid var(--gold);
            backdrop-filter: blur(10px); z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: var(--text);
        }

        .ui-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            display: flex; flex-direction: column; align-items: center;
            min-width: 260px;
        }

        .ink-bar { 
            width: 200px; height: 10px; background: rgba(0,0,0,0.1); 
            border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; 
        }

        #ink-progress { 
            height: 100%;
            background: var(--gold-grad); 
            transition: width 0.1s linear;
        }

        /* КНОПКИ */
        #reset-btn, #final-btn { 
            padding: 14px 35px; background: var(--gold-grad); border: none; 
            color: var(--btn-text); border-radius: 50px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase; transition: transform 0.2s;
        }
        
        #reset-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #reset-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; }

        .btn-icon {
            font-weight: 900;
            margin-left: 5px;
            vertical-align: middle;
        }

        /* КАРТОЧКА ФИНАЛА */
        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 40px; border-radius: 40px; width: 300px; text-align: center; z-index: 100; 
            background: var(--glass); border: 2px solid var(--gold); 
            box-shadow: 0 0 50px var(--canvas-shadow);
            backdrop-filter: blur(15px);
        }
        
        .card-name { font-size: 2.5rem; margin: 15px 0; font-family: 'Playfair Display', serif; display: block; }

        /* ВОТЕРМАРКА */
        #watermark {
            position: fixed; bottom: 15px; right: 15px;
            font-size: 10px; color: rgba(128, 128, 128, 0.6);
            z-index: 9999; pointer-events: none;
        }

        [data-vip="1"] #watermark { display: none !important; }

        @media (max-width: 950px) { .mission-sidebar { display: none; } }
    </style>
</head>
<body data-vip="0">

    <div class="mission-sidebar">
        <h3 style="margin-top:0">Твоя цель:</h3>
        <p>Нарисуй путь для <b>пчёлки</b>, чтобы она долетела до <b>цветка</b>. Запас пыльцы ограничен!</p>
    </div>

    <div id="canvas-container">
        <div style="position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 10;">
            <div class="ui-card" style="pointer-events: auto;">
                <div class="gold-text-effect" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">С Праздником 8 Марта! ✨</div>
                <div style="width: 100%; text-align: center;">
                    <span style="font-size: 0.8rem; display: block; margin-bottom: 3px;">Запас пыльцы 🐝</span>
                    <div class="ink-bar"><div id="ink-progress" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>
        
        <button id="reset-btn" onclick="resetLevel()" disabled>
            СНАЧАЛА <span class="btn-icon">⟲</span>
        </button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 class="gold-text-effect" style="margin:0; font-size: 1.2rem;">Для тебя,</h1>
        <span class="card-name gold-text-effect" id="nameDisplay"></span>
        <p id="messageDisplay" style="line-height: 1.5;"></p>
        <button onclick="resetLevel()" id="final-btn">
            ПОПРОБОВАТЬ ЕЩЕ ✨
        </button>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

    <script>
        const SECRET_SALT = "MySuperSecret8March2026"; 
        const MUSIC_MAP = {
            "1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
        };

        const params = new URLSearchParams(window.location.search);
        const nameB64 = params.get('name') || "";
        const msgB64 = params.get('msg') || "";
        const vip = params.get('vip') || "0";
        const musicId = params.get('music') || "0";
        const receivedHash = params.get('hash') || "";

        function decode(s) { 
            try { 
                return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); 
            } catch(e) { return "Прекрасной леди"; } 
        }

        // --- ИНИЦИАЛИЗАЦИЯ ТЕМЫ ---
        const checkString = nameB64 + msgB64 + vip + musicId + SECRET_SALT;
        const calculatedHash = CryptoJS.MD5(checkString).toString();
        
        if (vip === '1' && calculatedHash === receivedHash) {
            document.body.setAttribute('data-vip', '1');
        } else {
            document.body.setAttribute('data-vip', '0');
        }

        // --- ФИЗИКА И ИГРА ---
        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.55; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const beeImg = new Image();
        beeImg.src = 'https://raw.githubusercontent.com/rykacevn-boop/8march/main/image-Photoroom%20(18).png';

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.92, 800);
            canvas.height = Math.min(window.innerHeight * 0.75, 600);
        }
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false, animationId = null;

        const bee = Bodies.circle(70, 100, 25, { restitution: 0.3, friction: 0.1, label: 'bee', isStatic: true, inertia: Infinity });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        const ground = Bodies.rectangle(canvas.width/2, canvas.height + 15, canvas.width, 30, { isStatic: true });
        Composite.add(engine.world, [bee, flower, ground]);

        function resetLevel() {
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('reset-btn').disabled = true;
            isDone = false; isDrawing = false;
            document.getElementById('final-card').style.display = 'none';
            Composite.allBodies(engine.world).forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });
            Body.setStatic(bee, true);
            Body.setPosition(bee, { x: 70, y: 100 });
            Body.setVelocity(bee, { x: 0, y: 0 });
            Body.setAngle(bee, 0);
            ink = maxInk;
            document.getElementById('ink-progress').style.width = '100%';
            run();
        }

        function run() {
            if (isDone) return; 
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'line') {
                    ctx.beginPath();
                    body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                    ctx.fillStyle = '#d4af37';
                    ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                    ctx.fill(); ctx.shadowBlur = 0;
                }
                if (body.label === 'bee') {
                    ctx.save(); ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle); ctx.drawImage(beeImg, -30, -30, 60, 60);
                    ctx.restore();
                }
            });
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '58px Arial';
            ctx.fillText('🌸', flower.position.x, flower.position.y);
            animationId = requestAnimationFrame(run);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (isDone) return;
            if (!isDrawing && MUSIC_MAP[musicId]) {
                const audio = document.getElementById('bg-music');
                if (!audio.src) { audio.src = MUSIC_MAP[musicId]; audio.play(); }
            }
            isDrawing = true; lastPos = getPos(e);
            if (bee.isStatic) { Body.setStatic(bee, false); document.getElementById('reset-btn').disabled = false; }
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e);
            if (!lastPos) return;
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 8) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 7, { isStatic: true, angle: angle, label: 'line', friction: 0.1 });
                Composite.add(engine.world, segment);
                ink -= dist;
                document.getElementById('ink-progress').style.width = Math.max(0, (ink/maxInk)*100) + '%';
                lastPos = currentPos;
            }
        });

        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousedown", { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        }, {passive: false});

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower') && !isDone) {
                    isDone = true;
                    setTimeout(() => { document.getElementById('final-card').style.display = 'block'; }, 400);
                }
            });
        });

        window.onload = () => {
            document.getElementById('nameDisplay').textContent = decode(nameB64);
            document.getElementById('messageDisplay').textContent = decode(msgB64);
            run();
        };
    </script>
</body>
</html>
