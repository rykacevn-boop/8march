<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ПЕРЕМЕННЫЕ ПО УМОЛЧАНИЮ (VIP 0) */
        :root {
            --bg: #fff5f8;
            --text: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.8);
            --gold: #d4af37;
            --gold-grad: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b8860b 100%);
            --shadow: rgba(0, 0, 0, 0.1);
            --wm-display: block; /* Вотермарка видна */
        }

        /* ПРЕМИУМ ПЕРЕМЕННЫЕ (VIP 1) */
        [data-vip="1"] {
            --bg: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            --text: #ffffff;
            --glass: rgba(30, 30, 30, 0.9);
            --shadow: rgba(212, 175, 55, 0.3);
            --wm-display: none; /* Вотермарка скрыта */
        }

        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            transition: background 0.5s ease;
        }

        /* КОНТЕЙНЕР ИГРЫ */
        #canvas-container {
            position: relative; /* Чтобы UI прилипал к игре, а не к экрану */
            display: flex; justify-content: center; align-items: center;
        }

        canvas { 
            display: block; 
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                              url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg'); 
            background-size: cover;
            border: 4px solid var(--gold); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px var(--shadow); 
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ (ЦЕНТРОВКА) */
        .ui-wrapper {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; pointer-events: none; z-index: 10;
        }

        .ui-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 20px; border: 2px solid var(--gold);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            pointer-events: auto; min-width: 260px; text-align: center;
        }

        .gold-text-effect {
            background: var(--gold-grad); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; display: inline-block;
        }

        /* ВОТЕРМАРКА */
        #watermark {
            position: fixed; bottom: 15px; right: 15px;
            font-size: 10px; color: rgba(128, 128, 128, 0.5);
            display: var(--wm-display); /* Зависит от VIP */
            z-index: 9999;
        }

        /* ШКАЛА ПЫЛЬЦЫ */
        .ink-bar { 
            width: 100%; height: 10px; background: rgba(0,0,0,0.1); 
            border-radius: 10px; border: 1px solid var(--gold); overflow: hidden; margin-top: 5px;
        }
        #ink-progress { height: 100%; background: var(--gold-grad); transition: width 0.1s; }

        /* КНОПКИ */
        #reset-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; background: var(--gold-grad); border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 20;
        }
        #reset-btn:disabled { opacity: 0.5; }

        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 40px; border-radius: 40px; width: 300px; text-align: center; z-index: 100; 
            background: var(--glass); border: 2px solid var(--gold); backdrop-filter: blur(15px);
            box-shadow: 0 0 50px var(--shadow);
        }

        @media (max-width: 950px) { .mission-sidebar { display: none; } }
    </style>
</head>
<body data-vip="0">

    <div class="ui-wrapper">
        <div class="ui-card">
            <div class="gold-text-effect" style="font-size: 1.1rem; font-weight: bold;">С Праздником 8 Марта! ✨</div>
            <div style="font-size: 0.8rem; margin-top: 5px;">Запас пыльцы 🐝</div>
            <div class="ink-bar"><div id="ink-progress" style="width: 100%;"></div></div>
        </div>
    </div>

    <div id="canvas-container">
        <button id="reset-btn" onclick="resetLevel()" disabled>СНАЧАЛА ⟲</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 class="gold-text-effect" style="font-size: 1.2rem;">Для тебя,</h1>
        <div id="nameDisplay" class="gold-text-effect" style="font-size: 2rem; display: block; margin: 10px 0;"></div>
        <p id="messageDisplay"></p>
        <button onclick="resetLevel()" style="background: var(--gold-grad); padding: 12px 25px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px;">ЕЩЕ РАЗ ✨</button>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

    <script>
        const SECRET_SALT = "MySuperSecret8March2026";
        const params = new URLSearchParams(window.location.search);
        
        // --- ЛОГИКА VIP И ДЕКОДИРОВАНИЕ ---
        const nameB64 = params.get('name') || "";
        const msgB64 = params.get('msg') || "";
        const vip = params.get('vip') || "0";
        const musicId = params.get('music') || "0";
        const receivedHash = params.get('hash') || "";

        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }

        // Проверка хэша
        const checkString = nameB64 + msgB64 + vip + musicId + SECRET_SALT;
        const calculatedHash = CryptoJS.MD5(checkString).toString();

        if (vip === "1" && calculatedHash === receivedHash) {
            document.body.setAttribute('data-vip', '1');
        }

        document.getElementById('nameDisplay').textContent = decode(nameB64);
        document.getElementById('messageDisplay').textContent = decode(msgB64);

        // --- ИГРОВАЯ ЛОГИКА (Matter.js) ---
        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const beeImg = new Image(); beeImg.src = 'https://raw.githubusercontent.com/rykacevn-boop/8march/main/image-Photoroom%20(18).png';

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.95, 800);
            canvas.height = Math.min(window.innerHeight * 0.7, 600);
        }
        resize();

        let maxInk = canvas.width * 1.5, ink = maxInk, isDrawing = false, lastPos = null, isDone = false;

        const bee = Bodies.circle(70, 100, 25, { restitution: 0.3, label: 'bee', isStatic: true });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        Composite.add(engine.world, [bee, flower, Bodies.rectangle(canvas.width/2, canvas.height+15, canvas.width, 30, {isStatic:true})]);

        function resetLevel() {
            isDone = false; isDrawing = false; ink = maxInk;
            document.getElementById('final-card').style.display = 'none';
            document.getElementById('reset-btn').disabled = true;
            document.getElementById('ink-progress').style.width = '100%';
            Composite.allBodies(engine.world).forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });
            Body.setStatic(bee, true); Body.setPosition(bee, { x: 70, y: 100 }); Body.setVelocity(bee, { x: 0, y: 0 });
        }

        function run() {
            if (!isDone) {
                Engine.update(engine);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                Composite.allBodies(engine.world).forEach(body => {
                    if (body.label === 'line') {
                        ctx.beginPath(); body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                        ctx.fillStyle = '#d4af37'; ctx.fill();
                    }
                    if (body.label === 'bee') {
                        ctx.save(); ctx.translate(body.position.x, body.position.y);
                        ctx.rotate(body.angle); ctx.drawImage(beeImg, -30, -30, 60, 60); ctx.restore();
                    }
                });
                ctx.font = '50px Arial'; ctx.fillText('🌸', flower.position.x - 25, flower.position.y + 20);
                requestAnimationFrame(run);
            }
        }

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        canvas.addEventListener('mousedown', (e) => {
            if (isDone) return;
            isDrawing = true; lastPos = getPos(e);
            if (bee.isStatic) { Body.setStatic(bee, false); document.getElementById('reset-btn').disabled = false; }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDrawing || ink <= 0) return;
            const currentPos = getPos(e);
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 10) {
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const line = Bodies.rectangle((currentPos.x + lastPos.x)/2, (currentPos.y + lastPos.y)/2, dist+2, 6, { isStatic: true, angle, label: 'line' });
                Composite.add(engine.world, line);
                ink -= dist;
                document.getElementById('ink-progress').style.width = (ink/maxInk)*100 + '%';
                lastPos = currentPos;
            }
        });

        window.addEventListener('mouseup', () => isDrawing = false);
        
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if ([pair.bodyA.label, pair.bodyB.label].includes('bee') && [pair.bodyA.label, pair.bodyB.label].includes('flower')) {
                    isDone = true;
                    setTimeout(() => { document.getElementById('final-card').style.display = 'block'; }, 500);
                }
            });
        });

        run();
    </script>
</body>
</html>
