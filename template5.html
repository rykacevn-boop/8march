<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Королевский сад 8 Марта</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { 
            --primary-pink: #ff85a2; 
            --deep-pink: #d1305c; 
            --gold: #d4af37; 
            --text: #4a4a4a; 
        }
        
        body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fff5f8;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        #canvas-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        canvas { 
            display: block; 
            background-image: linear-gradient(rgba(255,255,255,0.2), rgba(255,255,255,0.2)), 
                              url('https://raw.githubusercontent.com/rykacevn-boop/8march/main/%D0%B7%D0%B0%D0%B3%D1%80%D1%83%D0%B6%D0%B5%D0%BD%D0%BD%D0%BE%D0%B5%20(1).jpg'); 
            background-size: cover;
            background-position: center;
            border: 4px solid var(--gold); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            z-index: 1;
        }

        /* Описание задачи сбоку */
        .mission-sidebar {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid var(--gold);
            backdrop-filter: blur(5px);
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .mission-sidebar h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin: 0 0 10px 0; color: var(--deep-pink); }
        .mission-sidebar p { font-size: 0.85rem; margin: 0; color: var(--text); line-height: 1.5; }

        /* Верхний интерфейс */
        .ui { position: absolute; top: 30px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .title { font-family: 'Playfair Display', serif; color: var(--text); font-size: 1.6rem; font-weight: 700; text-shadow: 0 1px 5px rgba(255,255,255,0.8); margin-bottom: 10px; }
        
        .ink-container { display: flex; flex-direction: column; align-items: center; }
        .ink-label { font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .ink-bar { width: 220px; height: 12px; background: rgba(0,0,0,0.1); border-radius: 10px; border: 1.5px solid var(--gold); overflow: hidden; }
        #ink-progress { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s ease-out; }
        
        /* Кнопка сброса */
        #reset-btn { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            padding: 14px 35px; background: var(--gold); border: none; color: white; 
            border-radius: 50px; font-weight: bold; cursor: pointer; pointer-events: auto; z-index: 20; 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        #reset-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
            transform: translateX(-50%) scale(0.95);
        }

        #reset-btn:active:not(:disabled) { transform: translateX(-50%) scale(0.9); }

        /* Финальная карточка */
        .card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 40px; border-radius: 30px; width: 280px; text-align: center; z-index: 100; 
            background: white; border: 2px solid var(--gold); box-shadow: 0 25px 60px rgba(0,0,0,0.3); 
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.275, 1.55);
        }

        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -60%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        .card-name { color: var(--primary-pink); font-size: 2.2rem; font-weight: 700; display: block; margin: 15px 0; font-family: 'Playfair Display', serif; }
        .card p { line-height: 1.6; color: #666; font-size: 1rem; }
        .card button { padding: 15px 30px; border: none; background: var(--primary-pink); color: white; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.3); }

        /* Адаптивность */
        @media (max-width: 950px) { .mission-sidebar { display: none; } }
    </style>
</head>
<body>

    <div class="mission-sidebar">
        <h3>Твоя цель:</h3>
        <p>Нарисуй путь для <b>пчёлки</b>, чтобы она долетела до <b>цветка</b>. Запас волшебной пыльцы ограничен!</p>
    </div>

    <div id="canvas-container">
        <div class="ui">
            <div class="title">С Праздником 8 Марта! ✨</div>
            <div class="ink-container">
                <span class="ink-label">Запас пыльцы 🐝</span>
                <div class="ink-bar"><div id="ink-progress"></div></div>
            </div>
        </div>
        <button id="reset-btn" onclick="resetLevel()" disabled>СНАЧАЛА 🔄</button>
        <canvas id="game"></canvas>
    </div>

    <div class="card" id="final-card">
        <h1 style="margin:0; font-size: 1.2rem; color: #555;">Для тебя,</h1>
        <span class="card-name" id="nameDisplay"></span>
        <p id="messageDisplay"></p>
        <button onclick="resetLevel()">ПОПРОБОВАТЬ ЕЩЕ 🌸</button>
    </div>

    <script>
        // Декодирование параметров URL
        const params = new URLSearchParams(window.location.search);
        function decode(s) { try { return new TextDecoder().decode(Uint8Array.from(atob(s.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0))); } catch(e) { return "Прекрасной леди"; } }
        document.getElementById('nameDisplay').textContent = decode(params.get('name'));
        document.getElementById('messageDisplay').textContent = decode(params.get('msg'));

        // Настройка Matter.js
        const { Engine, Bodies, Composite, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.55; 

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('reset-btn');

        // Предзагрузка изображения пчелы
        const beeImg = new Image();
        beeImg.src = 'https://raw.githubusercontent.com/rykacevn-boop/8march/main/image-Photoroom%20(18).png';

        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.92, 800);
            canvas.height = Math.min(window.innerHeight * 0.75, 600);
        }
        window.addEventListener('resize', resize);
        resize();

        let maxInk = canvas.width * 1.5;
        let ink = maxInk;
        let isDrawing = false, lastPos = null, isDone = false, animationId = null;

        // Создание объектов
        const bee = Bodies.circle(70, 100, 25, { 
            restitution: 0.3, friction: 0.1, label: 'bee', isStatic: true, inertia: Infinity
        });
        const flower = Bodies.circle(canvas.width - 70, canvas.height - 110, 35, { isStatic: true, label: 'flower' });
        const ground = Bodies.rectangle(canvas.width/2, canvas.height + 15, canvas.width, 30, { isStatic: true });
        Composite.add(engine.world, [bee, flower, ground]);

        function resetLevel() {
            if (animationId) cancelAnimationFrame(animationId);
            
            resetBtn.disabled = true;
            isDone = false;
            isDrawing = false;
            document.getElementById('final-card').style.display = 'none';

            // Удаление линий
            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(b => { if(b.label === 'line') Composite.remove(engine.world, b); });

            // Сброс физики пчелы
            Body.setStatic(bee, true);
            Body.setPosition(bee, { x: 70, y: 100 });
            Body.setVelocity(bee, { x: 0, y: 0 });
            Body.setAngularVelocity(bee, 0);
            Body.setAngle(bee, 0);
            bee.force = { x: 0, y: 0 };
            bee.torque = 0;

            ink = maxInk;
            document.getElementById('ink-progress').style.width = '100%';
            run();
        }

        function run() {
            if (isDone) return; 
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'line') {
                    ctx.beginPath();
                    body.vertices.forEach(v => ctx.lineTo(v.x, v.y));
                    ctx.fillStyle = '#d4af37';
                    ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (body.label === 'bee') {
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    ctx.drawImage(beeImg, -30, -30, 60, 60);
                    ctx.restore();
                }
            });

            // Отрисовка цветка (эмодзи)
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = '58px Arial'; ctx.fillText('🌸', flower.position.x, flower.position.y);

            animationId = requestAnimationFrame(run);
        }

        // Логика рисования
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX ?? (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const startDraw = (e) => {
            if (isDone) return;
            isDrawing = true; 
            lastPos = getPos(e);
            if (bee.isStatic) {
                Body.setStatic(bee, false);
                resetBtn.disabled = false;
            }
            if(e.cancelable) e.preventDefault();
        };

        const draw = (e) => {
            if (!isDrawing || ink <= 0 || isDone) return;
            const currentPos = getPos(e);
            if (!lastPos) return;
            const dist = Vector.magnitude(Vector.sub(currentPos, lastPos));
            if (dist > 8) {
                const mid = Vector.div(Vector.add(currentPos, lastPos), 2);
                const angle = Math.atan2(currentPos.y - lastPos.y, currentPos.x - lastPos.x);
                const segment = Bodies.rectangle(mid.x, mid.y, dist + 2, 7, { isStatic: true, angle: angle, label: 'line', friction: 0.1 });
                Composite.add(engine.world, segment);
                ink -= dist;
                document.getElementById('ink-progress').style.width = Math.max(0, (ink/maxInk)*100) + '%';
                lastPos = currentPos;
            }
        };

        // Слушатели событий
        canvas.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        // Столкновения
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                if (labels.includes('bee') && labels.includes('flower') && !isDone) {
                    isDone = true;
                    resetBtn.disabled = true;
                    setTimeout(() => { document.getElementById('final-card').style.display = 'block'; }, 400);
                }
            });
        });

        run();
    </script>
<div id="watermark" style="
    position: fixed; 
    bottom: 10px; 
    right: 10px; 
    font-family: Arial, sans-serif; 
    font-size: 12px; 
    color: rgba(0,0,0,0.3); 
    z-index: 9999;
    pointer-events: none;">
    Создано в @postcard_congrat_bot
</div>
</body>
</html>
