<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Собери свой букет 💐</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* СТАНДАРТНАЯ ТЕМА (vip=0) */
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b8860b, #fcf6ba, #aa8954);
            --bg-gradient: radial-gradient(circle, #ffffff 0%, #f3f3f3 100%);
            --ui-text: #4a4a4a;
            --ui-hint: #999999;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-h1: #4a4a4a;
            --text-msg: #666666;
            --border-inner: rgba(212, 175, 55, 0.3);
            --card-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }

        /* ПРЕМИУМ ТЕМА (vip=1) */
        [data-vip="1"] {
            --bg-gradient: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            --ui-text: #e0e0e0;
            --ui-hint: #aaaaaa;
            --card-bg: rgba(20, 20, 20, 0.95);
            --text-h1: #ffffff;
            --text-msg: #cccccc;
            --border-inner: rgba(212, 175, 55, 0.5);
            --card-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.5s ease;
        }

        #game-ui {
            position: absolute; width: 100%; top: 30px; text-align: center;
            color: var(--ui-text); z-index: 10; font-size: 0.9rem;
            letter-spacing: 2px; text-transform: uppercase;
        }

        #count {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; color: #d4af37; font-weight: bold;
        }

        .flower-item {
            position: absolute; width: 70px; height: 70px;
            cursor: pointer; z-index: 5; font-size: 50px; 
            display: flex; justify-content: center; align-items: center;
            user-select: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flower-item:active { transform: scale(1.5); }

        #final-card {
            display: none; position: relative; z-index: 20;
            background: var(--card-bg);
            padding: 40px 30px; border-radius: 0px; 
            text-align: center; max-width: 350px; width: 85%;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-inner);
            animation: luxePop 1s ease-out;
            transition: all 0.5s ease;
        }

        #final-card::before {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid var(--border-inner); pointer-events: none; opacity: 0.5;
        }

        @keyframes luxePop {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #bouquet-container {
            font-size: 100px; margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--text-h1); font-size: 1.5rem; margin: 0; font-weight: 400;
        }

        #nameDisplay { 
            font-family: 'Playfair Display', serif;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem; font-weight: 700; margin: 10px 0 20px 0;
        }

        #messageDisplay {
            color: var(--text-msg); font-size: 1rem; line-height: 1.6;
            font-weight: 300; white-space: pre-wrap;
        }

        .confetti {
            position: absolute; width: 6px; height: 6px; z-index: 15;
            pointer-events: none; border-radius: 50%;
        }

        #watermark {
            position: fixed; bottom: 10px; right: 10px; 
            font-family: sans-serif; font-size: 12px; 
            color: rgba(128,128,128,0.5); z-index: 9999; display: none;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        Соберите редкие цветы для букета<br>
        <span id="count">0</span> <span style="font-size: 0.8rem; color: var(--ui-hint);">/ 10</span>
    </div>

    <div id="final-card">
        <div id="bouquet-container">💐</div>
        <h1>Для самой прекрасной</h1>
        <div id="nameDisplay"></div>
        <div id="messageDisplay">Ты собрала этот букет с любовью. Пусть каждый цветок в нём станет исполненным желанием! 🌸</div>
    </div>

    <div id="watermark">Создано в @postcard_congrat_bot</div>
    <audio id="bg-music" loop></audio>

<script>
    // --- Настройки ---
    const SECRET_SALT = "MySuperSecret8March2026"; 
	const MUSIC_MAP = {
				"1": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
				"2": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
				"3": "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
				"4": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Labrinth_-_Still_Dont_Know_My_Name_67181174.mp3",
				"5": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Rihanna_-_Kiss_It_Better_48112885.mp3",
				"6": "https://raw.githubusercontent.com/rykacevn-boop/8march/main/Aarne_Toxi_Big_Baby_Tape_-_NOBODY_80172673.mp3"
			};
    const params = new URLSearchParams(window.location.search);
    const nameB64 = params.get('name') || "";
    const msgB64 = params.get('msg') || "";
    const vip = params.get('vip') || "0";
    const musicId = params.get('music') || "0";
    const receivedHash = params.get('hash') || "";
    
    // Определяем тему для расчета хеша
    const theme = (vip === '1') ? "dark" : "light";

    const flowers = ['🌸', '🌷', '🌹', '🌺', '🌻', '🌼', '💐', '✨'];
    let collected = 0;
    const total = 10;
    let musicStarted = false;

    function decodeBase64(str) {
        if (!str || str.trim() === "") return null;
        try {
            let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4 !== 0) b64 += '=';
            return new TextDecoder("utf-8").decode(new Uint8Array(atob(b64).split("").map(c => c.charCodeAt(0))));
        } catch (e) { return null; }
    }

    function startMusic() {
        if (!musicStarted && MUSIC_MAP[musicId]) {
            const audio = document.getElementById('bg-music');
            audio.src = MUSIC_MAP[musicId];
            audio.play().catch(() => console.log("Audio blocked"));
            musicStarted = true;
        }
    }

    function createFlower() {
        const f = document.createElement('div');
        f.className = 'flower-item';
        f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
        f.style.left = (20 + Math.random() * (window.innerWidth - 100)) + 'px';
        f.style.top = (100 + Math.random() * (window.innerHeight - 200)) + 'px';
        
        f.animate([
            { transform: 'translateY(0) rotate(0deg)' },
            { transform: 'translateY(-15px) rotate(10deg)' },
            { transform: 'translateY(0) rotate(0deg)' }
        ], { duration: 2000 + Math.random()*2000, iterations: Infinity });

        f.onclick = () => collect(f);
        f.ontouchstart = (e) => { e.preventDefault(); collect(f); };
        document.body.appendChild(f);
    }

    function collect(element) {
        if (element.getAttribute('data-collected')) return;
        
        startMusic();

        element.setAttribute('data-collected', 'true');
        collected++;
        document.getElementById('count').textContent = collected;
        
        element.style.transition = "all 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045)";
        element.style.left = "50%";
        element.style.top = "50%";
        element.style.transform = "scale(0) rotate(720deg)";
        
        if (window.navigator.vibrate) window.navigator.vibrate(20);
        setTimeout(() => element.remove(), 600);

        if (collected === total) {
            setTimeout(showFinal, 800);
        } else {
            createFlower(); 
        }
    }

    function showFinal() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('final-card').style.display = 'block';
        createConfetti();
    }

    function createConfetti() {
        // Меняем цвета конфетти в зависимости от статуса VIP
        const isVip = document.documentElement.getAttribute('data-vip') === '1';
        const colors = isVip ? ['#d4af37', '#fcf6ba', '#ffffff'] : ['#d4af37', '#ff69b4', '#ffffff'];
        
        for(let i=0; i<60; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.left = "50%"; c.style.top = "50%";
            document.body.appendChild(c);
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 300 + 50;
            c.animate([
                { transform: 'translate(-50%, -50%) translate(0, 0)', opacity: 1 },
                { transform: `translate(-50%, -50%) translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
            ], { duration: 2000, fill: 'forwards' });
        }
    }

    window.onload = function() {
        // Проверка безопасности с учетом theme
        const checkString = nameB64 + msgB64 + vip + musicId + theme + SECRET_SALT;
        const calculatedHash = CryptoJS.MD5(checkString).toString();
        const watermark = document.getElementById('watermark');

        if (vip === '1' && calculatedHash === receivedHash) {
            document.documentElement.setAttribute('data-vip', '1');
            if (watermark) watermark.remove();
        } else {
            document.documentElement.removeAttribute('data-vip');
            if (watermark) watermark.style.display = 'block';
        }

        // Тексты
        const decodedName = decodeBase64(nameB64);
        document.getElementById('nameDisplay').textContent = (decodedName || "Леди");
        const decodedMsg = decodeBase64(msgB64);
        if (decodedMsg) document.getElementById('messageDisplay').textContent = decodedMsg;

        // Инициализация цветов
        for(let i=0; i<4; i++) setTimeout(createFlower, i*300);
    };
</script>
</body>
</html>
