<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Собери свой букет 💐</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: radial-gradient(circle, #fff0f5 0%, #fecfef 100%);
            font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none;
        }

        #game-ui {
            position: absolute; width: 100%; top: 20px; text-align: center;
            color: #d81b60; font-weight: bold; z-index: 10;
        }

        .flower-item {
            position: absolute; width: 60px; height: 60px;
            cursor: pointer; transition: transform 0.3s ease;
            z-index: 5; font-size: 40px; display: flex;
            justify-content: center; align-items: center;
            user-select: none;
        }

        /* Финальная карточка */
        #final-card {
            display: none; position: relative; z-index: 20;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.2);
            text-align: center; max-width: 85%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #bouquet-container {
            font-size: 80px; margin-bottom: 10px;
        }

        #messageDisplay {
            color: #880e4f;
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-wrap; /* Сохраняем переносы строк */
        }

        .confetti {
            position: absolute; width: 10px; height: 10px; z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body style="display: flex; justify-content: center; align-items: center;">

    <div id="game-ui">Нужно собрать все цветы для букета: <span id="count">0</span> / 10</div>

    <div id="final-card">
        <div id="bouquet-container">💐</div>
        <h1 style="color: #d81b60; margin: 0;">С 8 Марта,</h1>
        <div id="nameDisplay" style="color: #ad1457; font-size: 1.8rem; font-weight: bold; margin: 10px 0;"></div>
        <div id="messageDisplay">Ты собрала самый красивый букет в мире! Пусть твоя жизнь будет такой же яркой! 🌸</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nameBase64 = params.get('name');
        const msgBase64 = params.get('msg');
        
        const flowers = ['🌸', '🌷', '🌹', '🌺', '🌻', '🌼', '💐', '🍀'];
        let collected = 0;
        const total = 10;

        // Универсальная функция декодирования
        function decodeBase64(str) {
            try {
                return decodeURIComponent(atob(str).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            } catch (e) { return null; }
        }

        // 1. Декодируем Имя
        const decodedName = decodeBase64(nameBase64);
        document.getElementById('nameDisplay').innerText = (decodedName || "Прекрасная Дама") + "!";

        // 2. Декодируем Сообщение
        const decodedMsg = decodeBase64(msgBase64);
        if (decodedMsg && decodedMsg.trim() !== "") {
            document.getElementById('messageDisplay').innerText = decodedMsg;
        }

        function createFlower() {
            const f = document.createElement('div');
            f.className = 'flower-item';
            f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            f.style.top = Math.random() * (window.innerHeight - 60) + 'px';
            
            f.onclick = () => collect(f);
            f.ontouchstart = (e) => { e.preventDefault(); collect(f); };
            
            document.body.appendChild(f);
        }

        function collect(element) {
            if (element.getAttribute('data-collected')) return;
            element.setAttribute('data-collected', 'true');
            
            collected++;
            document.getElementById('count').innerText = collected;
            
            element.style.transition = "all 0.5s ease-in";
            element.style.left = "50%";
            element.style.top = "50%";
            element.style.transform = "scale(0) rotate(360deg)";
            
            if (window.navigator.vibrate) window.navigator.vibrate(30);

            setTimeout(() => element.remove(), 500);

            if (collected === total) {
                setTimeout(showFinal, 600);
            } else {
                createFlower(); 
            }
        }

        function showFinal() {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('final-card').style.display = 'block';
            createConfetti();
        }

        function createConfetti() {
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.background = ['#ff69b4', '#ff1493', '#ffd700', '#ffffff', '#00ced1'][Math.floor(Math.random()*5)];
                c.style.left = "50%";
                c.style.top = "50%";
                document.body.appendChild(c);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 250 + 100;
                
                c.animate([
                    { transform: 'translate(-50%, -50%) translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(-50%, -50%) translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
                ], { 
                    duration: 1200 + Math.random()*800, 
                    fill: 'forwards',
                    easing: 'ease-out'
                });
            }
        }

        // Запуск первой порции цветов
        for(let i=0; i<3; i++) createFlower();
    </script>
</body>
</html>
