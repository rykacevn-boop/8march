<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        h1 {
            color: #d81b60;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        #nameDisplay {
            color: #ad1457;
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #880e4f;
        }

        /* Анимация лепестков */
        .petal {
            position: absolute;
            background-color: #ffcce0;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>С 8 Марта,</h1>
        <span id="nameDisplay">Загрузка...</span>
        <p>Пусть этот день будет наполнен цветами, <br> улыбками и весенним теплом! 🌸</p>
    </div>

    <script>
        // 1. Получаем зашифрованное имя из ссылки
        const params = new URLSearchParams(window.location.search);
        const nameBase64 = params.get('name');
        const display = document.getElementById('nameDisplay');

        if (nameBase64) {
            try {
                // 2. Декодируем Base64 с учетом русских букв (UTF-8)
                const decodedName = decodeURIComponent(atob(nameBase64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                
                display.innerText = decodedName + '!';
            } catch (e) {
                console.error("Ошибка декодирования:", e);
                display.innerText = "Прекрасная Дама!";
            }
        } else {
            display.innerText = "Прекрасная Дама!";
        }

        // 3. Создаем падающие лепестки
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            const size = Math.random() * 15 + 10 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 3 + 3 + 's';
            
            document.body.appendChild(petal);

            // Удаляем лепесток после завершения анимации
            setTimeout(() => {
                petal.remove();
            }, 6000);
        }

        setInterval(createPetal, 200);
    </script>
</body>
</html>
